<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLSL Sequencer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; overflow: hidden; background: #000; font: 12px/1.4 ui-monospace, monospace; color: #ddd; }
  #glcanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  #editor {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    background: rgba(12,12,16,0.86); backdrop-filter: blur(6px);
    border-top: 1px solid #2a2a30; padding: 10px 12px;
  }
  #editor.hidden { display: none; }
  .transport { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .transport button { background:#1c1c22; color:#ddd; border:1px solid #3a3a44; border-radius:5px; padding:5px 10px; cursor:pointer; }
  .transport button:hover { background:#26262e; }
  .transport select { background:#1c1c22; color:#ddd; border:1px solid #3a3a44; border-radius:5px; padding:4px; }
  .transport input[type=range] { vertical-align:middle; }
  .transport button.on { background:#caa23a; color:#111; border-color:#caa23a; font-weight:700; }
  .lane .pit { width:38px; background:#1c1c22; color:#ddd; border:1px solid #3a3a44; border-radius:4px; padding:2px; }
  .lane select.nlen { background:#1c1c22; color:#ddd; border:1px solid #3a3a44; border-radius:4px; padding:2px; font-size:10px; }
  .lane .lsel { width:120px; background:#1c1c22; color:#ddd; border:1px solid #3a3a44; border-radius:4px; padding:2px; font-size:10px; }
  .lane .mv { width:16px; padding:0; background:#1c1c22; color:#9aa; border:1px solid #3a3a44; border-radius:3px; cursor:pointer; font-size:9px; line-height:14px; }
  .lane .grip { cursor:grab; color:#666; padding:0 3px; user-select:none; font-size:11px; }
  .lane.dragover { outline:1px dashed #8cf; outline-offset:1px; }
  .lane select.nmsel { width:96px; background:#1c1c22; color:#cdd; border:1px solid #3a3a44; border-radius:4px; padding:2px; font-size:10px; }
  .lane .eye { width:20px; }
  .knob { display:inline-flex; flex-direction:column; align-items:center; width:28px; flex:none; }
  .knob .dial { width:20px; height:20px; border-radius:50%; background:#1c1c22; border:1px solid #3a3a44; position:relative; cursor:ns-resize; touch-action:none; }
  .knob .dial::after { content:""; position:absolute; left:50%; top:2px; width:2px; height:7px; background:#caa23a; transform-origin:50% 8px; transform:translateX(-50%) rotate(var(--a,0deg)); border-radius:1px; }
  .knob .klabel { font-size:8px; color:#9aa; margin-top:1px; letter-spacing:.5px; }
  .lane .ms { width:15px; padding:0; background:#1c1c22; border:1px solid #3a3a44; border-radius:3px; cursor:pointer; font-size:9px; line-height:14px; color:#9aa; flex:none; }
  .lane .ms.on { background:#caa23a; color:#111; border-color:#caa23a; font-weight:700; }
  .lane .ms.solo.on { background:#4ad; border-color:#4ad; }
  .lane .ms.fx.on { background:#3a3a44; color:#caa23a; border-color:#caa23a; }
  .fxpop { position:absolute; bottom:100%; left:120px; margin-bottom:4px; display:none; gap:6px; z-index:20;
           background:#15151b; border:1px solid #3a3a44; border-radius:6px; padding:6px 8px; box-shadow:0 4px 14px rgba(0,0,0,.6); }
  .fxpop.open { display:flex; }
  .transport .knob { margin:0 1px; }
  .fxrack { display:flex; flex-wrap:wrap; align-items:flex-end; gap:6px 8px; padding:6px 4px 8px; margin-bottom:6px; border-bottom:1px solid #2a2a30; }
  .fxrack .knob.inert .dial { opacity:.55; }
  .fxrack .knob.inert .dial::after { background:#777; }
  .fxbtn { height:34px; padding:0 8px; background:#1c1c22; color:#cdd; border:1px solid #3a3a44; border-radius:5px; cursor:pointer; font-size:10px; }
  .fxbtn.on { background:#caa23a; color:#111; border-color:#caa23a; font-weight:700; }
  .fxbtn.inert { opacity:.65; }
  .banks { display:inline-flex; gap:3px; }
  .banks .bank { width:24px; background:#1c1c22; color:#9aa; border:1px solid #3a3a44; border-radius:5px; padding:5px 0; cursor:pointer; font-weight:700; }
  .banks .bank.filled { color:#cdd; border-color:#5a6; }
  .banks .bank.on { background:#caa23a; color:#111; border-color:#caa23a; }
  .banks .bank.store { background:#4ad; color:#111; }
  .lane .fxslot { width:30px; height:18px; flex:none; display:flex; align-items:center; justify-content:center;
    font-size:8px; color:#888; background:#15151b; border:1px dashed #3a3a44; border-radius:4px; overflow:hidden; }
  .lane .fxslot.set { color:#caa23a; border-style:solid; border-color:#caa23a; }
  .lane .fxslot.over { background:#26323a; border-color:#8cf; }
  /* small-screen (down to ~8 inch) adaptability */
  @media (max-width:1024px), (max-height:820px){
    body { font-size:11px; }
    #editor { max-height:62vh; overflow:auto; padding:6px 8px; }
    .transport { gap:6px; }
    .fxrack { gap:4px 5px; }
    .knob { width:24px; } .knob .dial { width:17px; height:17px; }
    .knob .dial::after { height:6px; transform-origin:50% 7px; }
    .lane { gap:3px; } .lane select.nmsel { width:78px; } .lane .cell { height:14px; }
    .lane .fxslot { width:26px; }
  }
  .lane .eye.off { color:#555; background:#141418; }
  .transport select { background:#1c1c22; color:#ddd; border:1px solid #3a3a44; border-radius:5px; padding:4px; }
  .transport .title { font-weight:700; color:#8cf; letter-spacing:1px; margin-right:6px; }
  .transport label { color:#999; }
  #grid { display:flex; flex-direction:column; gap:4px; }
  .lane { display:flex; align-items:center; gap:4px; position:relative; }
  .swatch { width:12px; height:12px; border-radius:3px; flex:none; }
  .lane .nm { width:64px; flex:none; color:#cdd; font-size:11px; }
  .cells { display:grid; grid-auto-flow:column; gap:3px; flex:1; }
  .cell { height:18px; border-radius:3px; background:#23232b; border:1px solid #34343e; cursor:pointer; }
  .cell.beat { background:#3a3a46; }
  .cell.on { background:#ff7a1a; border-color:#ffa64d; box-shadow:0 0 7px rgba(255,140,40,0.85); }
  .cell.play { outline:2px solid #fff6; }
  .hint { color:#666; font-size:10px; margin-top:8px; }
  kbd { background:#222; border:1px solid #444; border-radius:3px; padding:0 4px; }
</style>
<script src="../layers_bundle.js"></script>
</head>
<body>
<canvas id="glcanvas"></canvas>

<!-- ===== Scene 6687 composition; each element is stepped, hit steps scale 120% ===== -->
<script type="x-shader/x-fragment" id="fs">
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform float uBass, uMid, uTreble;   // audio bands 0..1
uniform float uSteps;                 // steps per lane
uniform float uChannels;              // rows in the pulse texture
uniform sampler2D uPulseTex;          // steps x channels, .r = per-step pulse 0..1
uniform float uEnOpen;                // open-hat (row 5) energy for leaves
uniform sampler2D uAtlas;             // separated object-layers packed 4x2; one tile per channel
uniform float uHasLayer[8];           // 1 = that channel renders a layer instead of its built-in element
uniform float uVis[8];                // 1 = channel visible
uniform float uOpacity[8];            // per-channel layer opacity
uniform float uStrobe;                // 1 = strobe overlay on top of everything
uniform float uSpiral;                // 0..1 swirl warp 0..1

float h2(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float vn(vec2 p){ vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(h2(i),h2(i+vec2(1.0,0.0)),f.x), mix(h2(i+vec2(0.0,1.0)),h2(i+vec2(1.0,1.0)),f.x), f.y); }
float fbm2(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<4;i++){ v+=a*vn(p); p*=2.0; a*=0.5; } return v; }
mat2 rot(float a){ float s=sin(a), c=cos(a); return mat2(c,-s,s,c); }
float boxMask(vec2 p, vec2 c, vec2 h, float ang){
    vec2 d = rot(ang) * (p - c); vec2 q = abs(d) - h; return step(max(q.x, q.y), 0.0);
}
float boxEdge(vec2 p, vec2 c, vec2 h, float ang){
    vec2 d = abs(rot(ang) * (p - c)) - h;
    return abs(length(max(d, 0.0)) + min(max(d.x, d.y), 0.0));
}
float pulseAt(float ch, float seg){
    return texture2D(uPulseTex, vec2((seg + 0.5) / uSteps, (ch + 0.5) / uChannels)).r;
}
// warp a 0..1 along-lane coordinate so the hit step zooms to 120% around its centre
float stepWarp(float t, float ch, out float bright){
    float seg = floor(t * uSteps);
    float p = pulseAt(ch, seg);
    float cT = (seg + 0.5) / uSteps;
    bright = 1.0 + p * 0.55;
    return (t - cT) / (1.0 + p * 1.0) + cT;    // 1.0 -> 2.0 (200%) magnification at p=1
}

vec3 granite(vec2 uv){
    vec2 px = gl_FragCoord.xy;
    float fine = h2(floor(px/1.5)), med = h2(floor(uv*320.0)), coarse = h2(floor(uv*90.0));
    float spec = fine*0.5 + med*0.3 + coarse*0.2;
    vec3 c = mix(vec3(0.42,0.42,0.45), vec3(0.76,0.76,0.80), spec);
    c += (step(0.93,med) - step(0.985,med)) * 0.20;
    c -= step(0.965,coarse) * 0.16;
    // no directional brightness drift here -> the only shadow in the scene is the sequencer's
    c += step(0.99, h2(floor(uv*240.0) + floor(iTime*4.0))) * 0.45;
    return c;
}
vec3 grateCol(vec2 uv, float edge){
    float sx = uv.x / edge;
    float bars = abs(fract(sx * 15.0) - 0.5);
    float slat = smoothstep(0.16, 0.30, bars);
    vec3 c = mix(vec3(0.05,0.05,0.06), vec3(0.20,0.21,0.25), slat);
    c += smoothstep(0.10, 0.0, abs(fract(uv.y - iTime*0.18) - 0.5) - 0.4) * slat * vec3(0.45,0.48,0.58);
    c += slat * 0.05 * sin(uv.y*80.0 + iTime*3.0);
    c -= (1.0 - slat) * 0.03;
    return c;
}
vec3 paverCol(vec2 uv){
    float grain = h2(floor(gl_FragCoord.xy/2.0));
    vec3 c = mix(vec3(0.62,0.55,0.40), vec3(0.78,0.71,0.52), grain*0.6 + 0.2);
    float sweep = dot(uv, vec2(0.7,-0.7));
    c += smoothstep(0.06, 0.0, abs(fract(sweep*1.2 - iTime*0.12) - 0.5) - 0.46) * vec3(0.08,0.07,0.05);
    return c;
}
vec3 satb(vec3 c, float s, float b){
    float l = dot(c, vec3(0.299, 0.587, 0.114));
    return clamp(mix(vec3(l), c, s) * b, 0.0, 1.0);
}

void main(){
    vec2 uv = gl_FragCoord.xy / iResolution.xy;
    if (uSpiral > 0.001){                                  // SPIRAL: swirl the scene around centre
        vec2 cen = uv - 0.5; float r = length(cen);
        float ang = atan(cen.y, cen.x) + uSpiral * (r * 7.0 - iTime * 1.2);
        uv = vec2(cos(ang), sin(ang)) * r + 0.5;
    }
    vec3 col = granite(uv);

    // BASS (row 2) — paver bands (upper-right), stepped along x
    float pm = max(boxMask(uv, vec2(0.78,0.82), vec2(0.24,0.11), -0.32),
                   boxMask(uv, vec2(0.86,0.50), vec2(0.13,0.22), -0.32));
    if (pm > 0.5 && uHasLayer[2] < 0.5 && uVis[2] > 0.5){
        float t = clamp((uv.x - 0.52) / 0.46, 0.0, 1.0);
        float bright; float tw = stepWarp(t, 2.0, bright);
        float cellT = fract(tw * uSteps);
        float edgeShade = 0.86 + 0.14 * smoothstep(0.0, 0.10, min(cellT, 1.0-cellT));
        col = paverCol(uv) * bright * edgeShade * (1.0 + uBass*0.4);
    }
    // DRUMS (row 1) — navy mosaic; the hit ring lights up following the tile grid (no scaling)
    vec2 c0 = vec2(0.58, 0.40); float ang = -0.32;
    vec2 hsz = vec2(0.30, 0.33);
    if (boxMask(uv, c0, hsz, ang) > 0.5 && uHasLayer[1] < 0.5 && uVis[1] > 0.5){
        vec2 local = rot(ang) * (uv - c0);
        vec2 g = local * vec2(34.0, 38.0);
        vec2 cell = fract(g); vec2 id = floor(g);
        float e = min(min(cell.x,1.0-cell.x), min(cell.y,1.0-cell.y));
        float grout = smoothstep(0.0, 0.07, e);
        float r = h2(id);
        vec3 tile = mix(vec3(0.08,0.11,0.30), vec3(0.16,0.22,0.50), r);          // navy blue tiles
        tile *= 0.9 + 0.1 * sin(iTime*1.5 + r*6.2831 + id.x*0.6 + id.y*0.9);
        float rn = max(abs(id.x) / 10.0, abs(id.y) / 12.0);                       // ring index in TILE units
        float seg = floor(clamp(rn, 0.0, 0.999) * uSteps);
        tile += pulseAt(1.0, seg) * vec3(0.35, 0.45, 0.85);                       // hit ring of tiles lights up
        col = mix(vec3(0.06,0.07,0.13), tile, grout) * (1.0 + uTreble*0.3);
    }
    // VOICE (row 0) — metal grate (left), divided HORIZONTALLY; a hit shows as a shadow band
    float edge = 0.30 - uv.y * 0.05;
    if (uv.x < edge && uHasLayer[0] < 0.5 && uVis[0] > 0.5){
        float seg = floor(uv.y * uSteps);
        float p = pulseAt(0.0, seg);
        float cellY = fract(uv.y * uSteps);
        float shadow = p * (0.55 + 0.35 * sin(cellY * 3.14159));    // soft shadow across the rails
        col = grateCol(vec2(uv.x, uv.y), edge) * (1.0 - shadow) * (1.0 + uMid*0.25);
    }
    // KEYBOARD (row 3) — curb + block joints, stepped along x (hit steps thicken + glow)
    if (uHasLayer[3] < 0.5 && uVis[3] > 0.5){
        float seg = floor(clamp(uv.x,0.0,1.0) * uSteps);
        float p = pulseAt(3.0, seg);
        float w = 0.010 + p * 0.020;
        float seam = smoothstep(w, 0.0, boxEdge(uv, vec2(0.58,0.40), vec2(0.30,0.33), -0.32));
        seam = max(seam, smoothstep(w, 0.0, boxEdge(uv, vec2(0.78,0.82), vec2(0.24,0.11), -0.32)));
        seam = max(seam, smoothstep(w+0.004, 0.0, abs(uv.x - (0.30 - uv.y*0.05) - 0.03)));
        vec3 sc = mix(vec3(0.05,0.045,0.04), vec3(0.95,0.82,0.45), p);
        col = mix(col, sc, seam * (0.7 + 0.3*p));
    }

    // SNARE (row 4) — tree-leaf shadow travelling clockwise around the screen edge
    if (uChannels > 4.5 && uHasLayer[4] < 0.5 && uVis[4] > 0.5){
        float dTop = 1.0 - uv.y, dBot = uv.y, dL = uv.x, dR = 1.0 - uv.x;
        float d = min(min(dTop, dBot), min(dL, dR));        // distance to nearest edge
        float fringe = smoothstep(0.30, 0.0, d);
        float t;                                            // clockwise perimeter coord 0..1
        if (d == dTop)      t = uv.x * 0.25;                        // top: left -> right
        else if (d == dR)   t = 0.25 + (1.0 - uv.y) * 0.25;        // right: top -> bottom
        else if (d == dBot) t = 0.50 + (1.0 - uv.x) * 0.25;        // bottom: right -> left
        else                t = 0.75 + uv.y * 0.25;                // left: bottom -> top
        float tr = fract(t + iTime * 0.06);                 // drift clockwise around the edge
        float seg = floor(tr * uSteps);
        float foliage = fbm2(vec2(t * 46.0, d * 16.0)) * 0.6 + fbm2(vec2(t * 90.0, d * 30.0)) * 0.4;
        float canopy = smoothstep(0.34, 0.60, foliage) * fringe * pulseAt(4.0, seg);
        col = mix(col, vec3(0.12,0.12,0.14), canopy * 0.92); // darker, more visible leaf shadow
    }
    // OPEN HAT (row 5) — falling leaves (shaped, spinning, autumn colours)
    if (uChannels > 5.5 && uHasLayer[5] < 0.5 && uVis[5] > 0.5){
        float asp = iResolution.x / iResolution.y;
        for (int i=0;i<40;i++){
            float fi = float(i);
            float hx = h2(vec2(fi,1.0)), hy = h2(vec2(fi,2.0)), hz = h2(vec2(fi,3.0));
            float sp = 0.05 + hy * 0.12;
            float py = 1.0 - fract(hx * 7.0 + iTime * sp);
            float px = hx + 0.05 * sin(iTime * 1.2 + fi);
            vec2 rel = uv - vec2(px, py); rel.x *= asp;
            vec2 L = rot(fi + iTime * (0.6 + hy)) * rel;             // spin as they fall
            float sz = 0.016 + hz * 0.010;
            float taper = max(0.18, 1.0 - abs(L.y) / (sz * 1.8));    // pointed tip
            float e = length(vec2(L.x / (sz * taper), L.y / (sz * 1.8)));
            float leaf = smoothstep(1.0, 0.78, e);
            if (leaf < 0.01) continue;
            float vein = smoothstep(0.0016, 0.0, abs(L.x)) * leaf;   // midrib
            vec3 lc = mix(vec3(0.40,0.60,0.18), vec3(0.78,0.32,0.08), hy);  // green -> red
            lc = mix(lc, vec3(0.88,0.70,0.16), step(0.66, hz) * 0.7);        // some gold
            lc -= vein * 0.25;
            col = mix(col, lc, leaf * (0.25 + 0.75 * uEnOpen));
        }
    }
    // HI HAT (row 6) — soft-serve dog poop (stacked tiers + curl tip), random scale, fades over note
    if (uChannels > 6.5 && uHasLayer[6] < 0.5 && uVis[6] > 0.5){
        float asp = iResolution.x / iResolution.y;
        for (int s=0;s<32;s++){
            if (float(s) >= uSteps) break;
            float p = pulseAt(6.0, float(s));
            if (p < 0.02) continue;
            vec2 pos = vec2(0.08 + 0.84 * h2(vec2(float(s),5.0)), 0.12 + 0.78 * h2(vec2(float(s),9.0)));
            float sz = 0.07 + h2(vec2(float(s),7.0)) * 0.09;          // random scale
            vec2 d = (uv - pos); d.x *= asp; d /= sz;                 // poop space, height ~1
            float lean = 0.10 * smoothstep(-0.1, 0.55, d.y);          // tip leans over
            vec2 dd = vec2(d.x - lean, d.y);
            float e1 = length(vec2(dd.x/0.42, (dd.y+0.26)/0.17)) - 1.0; // bottom tier (wide)
            float e2 = length(vec2(dd.x/0.32, (dd.y+0.02)/0.14)) - 1.0; // middle tier
            float e3 = length(vec2(dd.x/0.22, (dd.y-0.18)/0.12)) - 1.0; // top tier
            float tp = length(vec2((dd.x-0.03)/0.085,(dd.y-0.34)/0.10)) - 1.0; // curl tip
            float sdf = min(min(e1, e2), min(e3, tp));
            float pm = smoothstep(0.05, -0.02, sdf);
            if (pm < 0.01) continue;
            vec3 base = mix(vec3(0.28,0.16,0.06), vec3(0.52,0.35,0.18), d.y * 0.5 + 0.5); // brown grad
            base += vec3(0.12,0.09,0.05) * smoothstep(0.15, -0.25, dd.x) * smoothstep(0.06,-0.3,sdf); // left sheen
            base -= 0.10 * smoothstep(-0.2, 0.06, sdf);              // edge shading
            col = mix(col, base, pm * clamp(p, 0.0, 1.0));
        }
    }

    // SEPARATED LAYERS — placed natively, alpha-over ON TOP (transparent elsewhere = underlayers show).
    // The hit segment scales up to ~120% (local x-warp) and brightens; per-lane opacity blends overlaps.
    for (int c = 0; c < 8; c++){
        if (float(c) >= uChannels) break;
        if (uHasLayer[c] < 0.5 || uVis[c] < 0.5) continue;
        float cc = mod(float(c), 4.0), rr = floor(float(c) / 4.0);
        float xN = clamp(uv.x, 0.0, 0.999);
        float seg = floor(xN * uSteps);
        float p = pulseAt(float(c), seg);
        if (p < 0.02) continue;                                    // reveal only the hit segments, not the whole layer
        float segC = (seg + 0.5) / uSteps;
        float sx = (xN - segC) / (1.0 + p * 1.0) + segC;          // hit segment zooms to ~200%
        vec4 lc = texture2D(uAtlas, vec2((sx + cc) / 4.0, (uv.y + rr) / 2.0));
        col = mix(col, lc.rgb * (0.6 + p * 0.8), lc.a * uOpacity[c] * p);  // alpha follows the (ADSR) pulse envelope

    }

    col = satb(col, 1.22, 1.0);
    if (uStrobe > 0.5) col *= step(0.5, fract(iTime * 11.0));   // STROBE: hard on/off flicker over all layers
    gl_FragColor = vec4(col, 1.0);
}
</script>

<div id="editor">
  <div class="transport">
    <span class="title">GLSL SEQUENCER</span>
    <button id="play">▶ play</button>
    <button id="clear">clear</button>
    <button id="add">+ channel</button>
    <button id="loadBtn">♪ load audio</button>
    <input type="file" id="audioFile" accept="audio/*" hidden>
    <label>steps <select id="steps"><option>8</option><option>16</option><option selected>32</option><option>64</option></select></label>
    <button id="rand">🎲 rand</button>
    <span class="banks" title="pattern banks — click = switch live · double-click = store current">
      <button id="bankA" class="bank">A</button><button id="bankB" class="bank">B</button><button id="bankC" class="bank">C</button><button id="bankD" class="bank">D</button>
    </span>
    <button id="output">⧉ output</button>
    <span style="flex:1"></span>
    <span class="hint"><kbd>Space</kbd> play · <kbd>H</kbd> hide · right-click a knob to reset</span>
  </div>
  <div class="fxrack" id="fxrack"></div>

  shaper = actx.createWaveShaper(); shaper.oversample="2x"; shaper.curve = distCurve(state.fx.distort||0);
  tremGain = actx.createGain(); tremGain.gain.value=1;
  tremDepth = actx.createGain(); tremDepth.gain.value=(state.fx.tremolo||0)*0.5;
  tremLFO = actx.createOscillator(); tremLFO.type="sine"; tremLFO.frequency.value=6; tremLFO.connect(tremDepth); tremDepth.connect(tremGain.gain); tremLFO.start();
  // chain: master -> colour filter -> EQ(lo,mid,hi) -> distort -> tremolo -> master vol -> gate -> out
  master.connect(fxFilterNode); fxFilterNode.connect(eqLo); eqLo.connect(eqMid); eqMid.connect(eqHi);
  eqHi.connect(shaper); shaper.connect(tremGain); tremGain.connect(outGain); outGain.connect(gateGain); gateGain.connect(actx.destination);
  fxFilterNode.connect(fxDelay); fxDelay.connect(fb); fb.connect(fxDelay); fxDelay.connect(fxDelayMix); fxDelayMix.connect(outGain);
  fxFilterNode.connect(conv); conv.connect(revMix); revMix.connect(outGain);
  applyFilter(fxFilter); applyEcho(echoLevel);
  applyEQ(); applyDistort(state.fx.distort||0); applyTremolo(state.fx.tremolo||0);
}
function applyReverb(v){ if (revMix) revMix.gain.setTargetAtTime(v, actx.currentTime, 0.05); }
function applyEQ(){ if(!eqLo) return; eqLo.gain.value=(state.fx.lo||0)*15; eqMid.gain.value=(state.fx.mid||0)*15; eqHi.gain.value=(state.fx.hi||0)*15; }
function applyDistort(v){ if(shaper) shaper.curve = distCurve(v||0); }
function applyTremolo(v){ if(tremDepth) tremDepth.gain.value = (v||0)*0.5; }
function applyMaster(v){ if (outGain) outGain.gain.setTargetAtTime(v, actx.currentTime, 0.02); }
// schedule ADSR on a voice gain node; returns stop time
function applyEnv(g, t, peak, dur, ch){
  const e = state.adsr[ch] || ADSR_DEF;
  const A = Math.max(0.001, e.a), D = Math.max(0.001, e.d), S = Math.max(0.0001, e.s), R = Math.max(0.02, e.r * 2.0);
  const sus = Math.max(0.0001, peak * S);
  const g0 = g.gain; g0.cancelScheduledValues(t);
  g0.setValueAtTime(0.0001, t);
  g0.linearRampToValueAtTime(peak, t + A);
  g0.linearRampToValueAtTime(sus, t + A + D);
  const rel = t + Math.max(A + D, dur);
  g0.setValueAtTime(sus, rel);
  g0.exponentialRampToValueAtTime(0.0001, rel + R);
  return rel + R;
}
function applyFilter(v){            // v in -1..1 : <0 low-pass, >0 high-pass, ~0 bypass
  if (!fxFilterNode) return;
  if (Math.abs(v) < 0.03){ fxFilterNode.type = "allpass"; fxFilterNode.frequency.value = 20000; return; }
  if (v < 0){ fxFilterNode.type = "lowpass";  fxFilterNode.frequency.value = 200 * Math.pow(100, 1.0 + v); }
  else      { fxFilterNode.type = "highpass"; fxFilterNode.frequency.value = 20  * Math.pow(300, v); }
}
function applyEcho(level){
  if (!fxDelay) return;
  fxDelay.delayTime.value = 60 / state.bpm / 2;   // 1/8-note echo
  fxDelayMix.gain.setTargetAtTime(level * 0.6, actx.currentTime, 0.05);
}
function blip(ch){
  if (!actx) return;
  if (state.mute[ch]) return;                                               // muted
  if (state.solo.some(s => s) && !state.solo[ch]) return;                   // a solo is active elsewhere
  const type = (state.inst[ch] !== undefined) ? state.inst[ch] : 0;
  const semi = (state.pitch[ch] || 0) + (state.fx.trans || 0) + (state.fx.pitch || 0);   // + global transpose
  const ft = (base) => base * Math.pow(2, semi / 12);
  const dur = Math.max(0.04, (state.noteLen[ch] || 0.25) * 4 * 60 / state.bpm); // ADSR shapes the tail
  const t = actx.currentTime, g = actx.createGain();
  const gv = actx.createGain(); gv.gain.value = (state.vol[ch] !== undefined ? state.vol[ch] : 1);  // per-track volume
  g.connect(gv); gv.connect(master);
  const noiseSrc = (cut, q) => {
    const src = actx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const f = actx.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = cut; f.Q.value = q;
    src.connect(f); f.connect(g); return src;
  };
  let peak = 0.5, stop = t + dur + 0.1;
  if (type === 7){                                                          // 808 kick: pitch-drop sine
    const o = actx.createOscillator(); o.type="sine"; o.connect(g);
    o.frequency.setValueAtTime(ft(140), t); o.frequency.exponentialRampToValueAtTime(ft(42), t+0.12);
    peak = 0.9; stop = applyEnv(g, t, peak, Math.min(dur,0.5), ch); o.start(t); o.stop(stop+0.05);
  }
  else if (type === 8){                                                     // sampler/strings: sustained saw-ish
    const srcs = [1.0,1.005,2.0].map((m,i)=>{ const o=actx.createOscillator(); o.type=i<2?"sawtooth":"triangle"; o.frequency.value=ft(220)*m;
      const og=actx.createGain(); og.gain.value=i<2?0.18:0.08; o.connect(og); og.connect(g); return o; });
    peak = 0.5; stop = applyEnv(g, t, peak, Math.min(dur,6.0), ch); srcs.forEach(o=>{ o.start(t); o.stop(stop+0.05); });
  }
  else if (type === 0){ const s=noiseSrc(1900,0.8); peak=0.5; stop=applyEnv(g,t,peak,Math.min(dur,0.2),ch); s.start(t); s.stop(stop+0.02); } // perc
  else if (type === 4){                                                     // snare: noise body + tone accent
    const s=noiseSrc(1500,0.5); peak=0.45; stop=applyEnv(g,t,peak,Math.min(dur,0.25),ch); s.start(t); s.stop(stop+0.02);
    const o = actx.createOscillator(); o.type="triangle"; o.frequency.value=ft(200); const og=actx.createGain();
    og.gain.setValueAtTime(0.25,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.connect(og); og.connect(master); o.start(t); o.stop(t+0.14);
  }
  else if (type === 5){ const s=noiseSrc(7000,1.2); peak=0.30; stop=applyEnv(g,t,peak,Math.min(dur,0.35),ch); s.start(t); s.stop(stop+0.02); } // open hat
  else if (type === 6){ const s=noiseSrc(9000,1.5); peak=0.25; stop=applyEnv(g,t,peak,Math.min(dur,0.12),ch); s.start(t); s.stop(stop+0.02); } // hi hat
  else if (type === 3){                                                     // seams: keyboard
    const partials = [[1.0,0.5,"triangle"],[2.0,0.20,"sine"],[3.0,0.08,"sine"]];
    const srcs = partials.map(pp=>{ const o=actx.createOscillator(); o.type=pp[2]; o.frequency.value=ft(523.25)*pp[0];
      const og=actx.createGain(); og.gain.value=pp[1]; o.connect(og); og.connect(g); return o; });
    peak = 0.9; stop = applyEnv(g, t, peak, Math.min(dur,4.0), ch); srcs.forEach(o=>{ o.start(t); o.stop(stop+0.05); });
  }
  else {                                                                    // bass(1) sine, voice(2) triangle
    const o = actx.createOscillator(); o.type = (type===1)?"sine":"triangle"; o.frequency.value = ft(type===1?70:330); o.connect(g);
    peak = (type===1)?0.5:0.45; stop = applyEnv(g, t, peak, Math.min(dur,6.0), ch); o.start(t); o.stop(stop+0.05);
  }
}

// ---------- Audio-file reactivity ----------
let analyser = null, bins = null, audioEl = null, fileLoaded = false;
const bands = { bass: 0, mid: 0, treble: 0 };
const env = { bass: 0, mid: 0, treble: 0 };   // slow running average per band (for onset detection)
function loadAudioFile(file){
  initAudio(); if (actx) actx.resume();
  if (!audioEl){
    audioEl = new Audio(); audioEl.loop = true;
    const src = actx.createMediaElementSource(audioEl);
    analyser = actx.createAnalyser(); analyser.fftSize = 1024; analyser.smoothingTimeConstant = 0.8;
    bins = new Uint8Array(analyser.frequencyBinCount);
    src.connect(analyser); analyser.connect(master);   // through master FX
  }
  audioEl.src = URL.createObjectURL(file); fileLoaded = true;
  $("loadBtn").textContent = "♪ " + file.name.slice(0, 18);
  state.playing = true; $("play").textContent = "⏸ pause";
  audioEl.currentTime = 0; audioEl.play().catch(()=>{});
}
function updateBands(){
  if (!analyser || !audioEl || audioEl.paused){ bands.bass*=0.9; bands.mid*=0.9; bands.treble*=0.9; return; }
  analyser.getByteFrequencyData(bins);
  const avg = (a, b) => { let s=0; for (let i=a;i<b;i++) s += bins[i]; return s/((b-a)*255); };
  bands.bass   += (avg(1,8)    - bands.bass)   * 0.4;
  bands.mid    += (avg(8,40)   - bands.mid)    * 0.4;
  bands.treble += (avg(40,160) - bands.treble) * 0.4;
  env.bass   += (bands.bass   - env.bass)   * 0.04;   // slow envelope
  env.mid    += (bands.mid    - env.mid)    * 0.04;
  env.treble += (bands.treble - env.treble) * 0.04;
}

// ---------- reusable knob (drag to change, right-click / double-click to reset) ----------
function makeKnob({label, min=0, max=1, value=0, def=0, fmt, onInput}){
  const wrap = document.createElement("div"); wrap.className = "knob"; wrap.draggable = false;
  const dial = document.createElement("div"); dial.className = "dial";
  const cap  = document.createElement("div"); cap.className = "klabel"; cap.textContent = label;
  wrap.appendChild(dial); wrap.appendChild(cap);
  let v = value;
  const show = () => fmt ? fmt(v) : v.toFixed(2);
  function set(nv, fire){
    v = Math.max(min, Math.min(max, nv));
    const t = (max>min) ? (v-min)/(max-min) : 0;
    dial.style.setProperty("--a", (t*270-135) + "deg");
    wrap.title = label + ": " + show();
    if (fire && onInput) onInput(v);
  }
  set(value, false);
  let drag=false, sy=0, sv=0;
  dial.addEventListener("pointerdown", e => { drag=true; sy=e.clientY; sv=v; dial.setPointerCapture(e.pointerId); e.preventDefault(); });
  dial.addEventListener("pointermove", e => { if(!drag) return; set(sv + (sy-e.clientY)/120*(max-min), true); });
  dial.addEventListener("pointerup",   () => { drag=false; });
  wrap.addEventListener("contextmenu", e => { e.preventDefault(); set(def, true); });   // right-click reset
  dial.addEventListener("dblclick",    () => set(def, true));
  return { el: wrap, set: nv => set(nv, false), get: () => v };
}
// right-click reset for native inputs/selects
function bindReset(el, def, apply){
  el.addEventListener("contextmenu", e => { e.preventDefault(); apply(def); save(); });
}

// drag a channel to a new position — reorders draw/z order (lower index draws first = behind)
function reorderChannel(from, to){
  if (from === to) return;
  const S = state.steps;
  const move = (a) => { const v = a.splice(from,1)[0]; a.splice(to,0,v); };
  move(state.names); move(state.pitch); move(state.noteLen); move(state.layer); move(state.inst);
  move(state.adsr); move(state.opacity); move(state.vol); move(state.mute); move(state.solo); move(state.trackFx);
  const rows = (buf, Ctor) => { const r=[]; for (let c=0;c<state.channels;c++) r.push(buf.slice(c*S,(c+1)*S)); const v=r.splice(from,1)[0]; r.splice(to,0,v);
    const out = new Ctor(state.channels*S); r.forEach((row,c)=>out.set(row,c*S)); return out; };
  state.grid = rows(state.grid, Uint8Array);
  pulses2d  = rows(pulses2d, Float32Array);
  rise2d    = rows(rise2d, Float32Array);
  buildGrid(); save();
}
// change steps per pattern (16 / 32 / 64), preserving existing hits
function setSteps(n){
  const old = state.steps, g = new Uint8Array(state.channels*n);
  for (let c=0;c<state.channels;c++) for (let s=0;s<Math.min(old,n);s++) g[c*n+s]=state.grid[c*old+s];
  state.steps = n; state.grid = g; pulses2d = new Float32Array(state.channels*n); rise2d = new Float32Array(state.channels*n);
  state.lastStep = -1; buildGrid(); save();
}
function markPlayhead(step){
  document.querySelectorAll(".cell.play").forEach(e=>e.classList.remove("play"));
  if (step < 0) return;
  document.querySelectorAll(`.cell[data-s="${step}"]`).forEach(e=>e.classList.add("play"));
}

// ---------- persistence ----------
function save(){ try{ localStorage.setItem("scene6687seq3", JSON.stringify({
  steps:state.steps, channels:state.channels, names:state.names, bpm:state.bpm,
  pitch:state.pitch, noteLen:state.noteLen, layer:state.layer, inst:state.inst,
  adsr:state.adsr, opacity:state.opacity, vol:state.vol, mute:state.mute, solo:state.solo, trackFx:state.trackFx,
  swing:state.swing, reverb:state.reverb, master:state.master, fx:state.fx, fxFilter, echo:echoLevel, grid:Array.from(state.grid) })); }catch(e){} }
function load(){ try{ const d = JSON.parse(localStorage.getItem("scene6687seq3")); if(!d) return;
  const N = d.channels;
  state.steps=d.steps; state.channels=N; state.names=d.names||FULL_NAMES.slice(0,N);
  state.bpm=d.bpm||120; state.grid=Uint8Array.from(d.grid);
  state.pitch=d.pitch||Array.from({length:N},()=>0);
  state.noteLen=d.noteLen||Array.from({length:N},()=>0.25);
  state.layer=d.layer||Array.from({length:N},()=>"");
  state.inst=d.inst||Array.from({length:N},(_,c)=>INSTRUMENTS[c%8][1]);
  state.adsr = d.adsr || Array.from({length:N},(_,c)=> d.env ? {...ADSR_DEF, r:d.env[c]} : {...ADSR_DEF});  // migrate old env -> release
  state.opacity = d.opacity || Array.from({length:N},()=>1);
  state.vol = d.vol || Array.from({length:N},()=>1);
  state.mute = d.mute || Array.from({length:N},()=>0);
  state.solo = d.solo || Array.from({length:N},()=>0);
  state.trackFx = d.trackFx || Array.from({length:N},()=>"");
  state.swing = d.swing||0; state.reverb = d.reverb||0; state.master = (d.master!==undefined?d.master:1); state.fx = d.fx||{};
  fxFilter=d.fxFilter||0; echoLevel = (d.echo!==undefined ? d.echo : (d.echoOn ? 0.4 : 0));   // migrate old toggle
  pulses2d = new Float32Array(state.channels*state.steps); rise2d = new Float32Array(state.channels*state.steps); }catch(e){} }

// ---------- transport ----------
const stepDur = () => 60 / state.bpm / state.stepsPerBeat;
function playStop(){
  state.playing = !state.playing;
  $("play").textContent = state.playing ? "⏸ pause" : "▶ play";
  if (state.playing){
    initAudio(); if (actx) actx.resume();
    if (fileLoaded && audioEl) audioEl.play().catch(()=>{});
    else { state.startTime = performance.now()/1000 - state.playhead*stepDur(); playAccum = state.playhead; }
  } else { if (fileLoaded && audioEl) audioEl.pause(); }
}

// ---------- controls ----------
$("play").onclick = playStop;
// Clear: stop + silence audio, empty the grid, and reset every track to its default visuals
$("clear").onclick = () => {
  if (state.playing) playStop();
  if (fileLoaded && audioEl){ audioEl.pause(); }
  if (actx) applyMaster(state.master);                       // (re)assert master; voices already stopped
  state.grid.fill(0); pulses2d.fill(0); rise2d.fill(0); state.lastStep = -1;
  for (let c=0;c<state.channels;c++){
    state.layer[c] = ""; state.pitch[c] = 0; state.vol[c] = 1; state.opacity[c] = 1;
    state.adsr[c] = {...ADSR_DEF}; state.mute[c] = 0; state.solo[c] = 0; state.trackFx[c] = "";
  }
  buildGrid(); save();
};
$("add").onclick = () => {
  if (state.channels >= 8) return;
  const ng = new Uint8Array((state.channels+1)*state.steps); ng.set(state.grid); state.grid = ng;
  pulses2d = new Float32Array((state.channels+1)*state.steps); rise2d = new Float32Array((state.channels+1)*state.steps);
  state.names.push(FULL_NAMES[state.channels] || ("Ch " + (state.channels+1)));
  state.pitch.push(0); state.noteLen.push(0.25); state.layer.push("");
  state.inst.push(INSTRUMENTS[state.channels%8][1]);
  state.adsr.push({...ADSR_DEF}); state.opacity.push(1); state.vol.push(1); state.mute.push(0); state.solo.push(0); state.trackFx.push("");
  state.channels++;
  buildGrid(); save();
};
$("steps").onchange = (e) => setSteps(+e.target.value);
$("loadBtn").onclick = () => $("audioFile").click();
$("audioFile").onchange = (e) => { if (e.target.files[0]) loadAudioFile(e.target.files[0]); };
bindReset($("steps"), 32, () => { $("steps").value="32"; setSteps(32); });

// ---------- live performance FX (strobe / tape-stop / stutter / gate) ----------
let strobeOn = false, tapeStop = false, tapeFactor = 1, stutterOn = false, stutterAnchor = 0, playAccum = 0;
// note divisions -> size in 1/16 steps (a step = 1/16 note; min 1/32, max 32 notes)
const NOTE_DIVS = [["1/32",0.5],["1/16",1],["1/8",2],["1/4",4],["1/2",8],["1",16],["2",32],["4",64],["8",128],["16",256],["32",512]];
function gateInfo(v){ const i = Math.min(NOTE_DIVS.length-1, Math.max(0, Math.round(v*(NOTE_DIVS.length-1)))); return NOTE_DIVS[i]; }
function gateDiv(v){ return gateInfo(v)[0]; }
function gateSteps(v){ return Math.max(1, Math.round(gateInfo(v)[1])); }

// ---------- master FX rack (diagram layout). Wired = real effect now; others are UI for next week ----------
const pct = v => Math.round(v*100) + "%";
const FX_SPEC = [
  { k:"bpm",     label:"BPM",     min:60, max:200, def:120, fmt:v=>Math.round(v), wired:true,
    set:v=>{ state.bpm=Math.round(v); if(state.playing) state.startTime=performance.now()/1000 - state.playhead*stepDur(); } },
  { k:"filter",  label:"FILTER",  min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ fxFilter=v; initAudio(); applyFilter(v); } },
  { k:"delay",   label:"DELAY",   min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ echoLevel=v; initAudio(); applyEcho(v); } },
  { k:"reverb",  label:"REVERB",  min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.reverb=v; initAudio(); applyReverb(v); } },
  { k:"swing",   label:"SWING",   min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.swing=v; } },
  { k:"master",  label:"VOL",     min:0, max:1.5, def:1, fmt:pct, wired:true, set:v=>{ state.master=v; initAudio(); applyMaster(v); } },
  { k:"tremolo", label:"TREMOLO", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.tremolo=v; initAudio(); applyTremolo(v); } },
  { k:"distort", label:"DISTORT", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.distort=v; initAudio(); applyDistort(v); } },
  { k:"hi", label:"HI", min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.hi=v; initAudio(); applyEQ(); } },
  { k:"mid", label:"MID", min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.mid=v; initAudio(); applyEQ(); } },
  { k:"lo", label:"LO", min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.lo=v; initAudio(); applyEQ(); } },
  { k:"trans", label:"TRANS", min:-12, max:12, def:0, fmt:v=>Math.round(v), wired:true, set:v=>{ state.fx.trans=Math.round(v); } },
  { k:"pitch", label:"PITCH", min:-12, max:12, def:0, fmt:v=>Math.round(v), wired:true, set:v=>{ state.fx.pitch=Math.round(v); } },
  { k:"spiral", label:"SPIRAL", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.spiral=v; } },   // visual swirl
  // --- UI only for now (stored in state.fx, wired next week) ---
  { k:"flanger", label:"FLANGER" }, { k:"phaser", label:"PHASER" }, { k:"roll", label:"ROLL" },
  { k:"gate", label:"GATE", min:0, max:1, def:0, fmt:v=>v<0.02?"off":gateDiv(v), wired:true, set:v=>{ state.fx.gate=v; } },
  { k:"stutter", label:"SLICE", min:0, max:1, def:0.25, fmt:v=>gateDiv(v) },  // stutter slice size (held via STUTTER button)
];
const fxKnobs = {};
const fxrack = $("fxrack");
const fxCurrent = (sp) => sp.k==="bpm"?state.bpm : sp.k==="filter"?fxFilter : sp.k==="delay"?echoLevel
  : sp.k==="reverb"?state.reverb : sp.k==="swing"?state.swing : sp.k==="master"?state.master
  : (state.fx[sp.k]!==undefined?state.fx[sp.k]:(sp.def||0));
FX_SPEC.forEach(sp => {
  const kn = makeKnob({ label:sp.label, min:(sp.min!==undefined?sp.min:0), max:(sp.max!==undefined?sp.max:1),
    value:fxCurrent(sp), def:(sp.def!==undefined?sp.def:0), fmt:sp.fmt,
    onInput:v=>{ if(sp.wired) sp.set(v); else state.fx[sp.k]=v; save(); } });
  kn.el.dataset.fx = sp.k; kn.el.classList.toggle("inert", !sp.wired);
  kn.el.setAttribute("draggable","true");                                  // drag a master knob onto a lane FX slot
  kn.el.addEventListener("dragstart", e => e.dataTransfer.setData("text/fx", sp.k));
  fxKnobs[sp.k] = kn; fxrack.appendChild(kn.el);
});
// live FX buttons: STROBE (toggle), TAPE STOP + STUTTER (hold)
function fxButton(lab, hold, on, off){
  const btn=document.createElement("button"); btn.className="fxbtn"; btn.textContent=lab; btn.title=lab;
  if (hold){
    const dn=e=>{ e.preventDefault(); btn.classList.add("on"); initAudio(); on(); };
    const up=()=>{ btn.classList.remove("on"); off(); };
    btn.addEventListener("pointerdown",dn); btn.addEventListener("pointerup",up); btn.addEventListener("pointerleave",up);
  } else { btn.onclick=()=>{ const v=!btn.classList.contains("on"); btn.classList.toggle("on",v); on(v); }; }
  fxrack.appendChild(btn); return btn;
}
fxButton("STROBE", false, v => { strobeOn = v; });
fxButton("TAPE STOP", true, () => { tapeStop = true; }, () => { tapeStop = false; });
fxButton("STUTTER", true, () => { stutterOn = true; stutterAnchor = Math.floor(state.playhead); }, () => { stutterOn = false; });

// randomize a musical pattern (more hits on beats) + random visual layers and their sizes
$("rand").onclick = () => {
  const dens = [0.5,0.25,0.4,0.2,0.6,0.3,0.5,0.3];
  const CATg = window.LAYER_CATEGORY || {};
  const keys = Object.keys(LAYERS).filter(k => CATg[k]);                 // real 6687 layers (have a category)
  const bg = keys.filter(k => CATg[k] === "background");
  const fg = keys.filter(k => CATg[k] !== "background");
  const pick = a => a.length ? a[(Math.random()*a.length)|0] : "";
  for (let c=0;c<state.channels;c++){
    const d = dens[c%8];
    for (let s=0;s<state.steps;s++){
      const beat = (s % state.stepsPerBeat) === 0;
      state.grid[c*state.steps+s] = (Math.random() < d*(beat?1.5:0.6)) ? 1 : 0;
    }
    const full = Math.random() < 0.5;                                    // fullscreen vs not
    const key = full ? pick(bg) : pick(fg);
    if (key){ state.layer[c] = key; compileLayer(key); state.opacity[c] = full ? 1.0 : (0.6 + Math.random()*0.4); }
  }
  buildGrid(); save();
};
// ---------- A/B/C/D pattern banks: hold a full arrangement; click = switch live, dbl-click = store ----------
const BANK_KEY = "glslseq_banks";
let banks = {}; try { banks = JSON.parse(localStorage.getItem(BANK_KEY) || "{}"); } catch(e){}
function snapshot(){ return { steps:state.steps, channels:state.channels,
  grid:Array.from(state.grid), names:[...state.names], inst:[...state.inst], pitch:[...state.pitch],
  noteLen:[...state.noteLen], layer:[...state.layer], adsr:state.adsr.map(a=>({...a})),
  opacity:[...state.opacity], vol:[...state.vol], mute:[...state.mute], solo:[...state.solo], trackFx:[...state.trackFx] }; }
function applySnapshot(o){
  state.steps=o.steps; state.channels=o.channels; $("steps").value=String(o.steps);
  state.grid=Uint8Array.from(o.grid); pulses2d=new Float32Array(o.channels*o.steps); rise2d=new Float32Array(o.channels*o.steps);
  state.names=[...o.names]; state.inst=[...o.inst]; state.pitch=[...o.pitch]; state.noteLen=[...o.noteLen];
  state.layer=[...o.layer]; state.adsr=o.adsr.map(a=>({...a})); state.opacity=[...o.opacity]; state.vol=[...o.vol];
  state.mute=[...o.mute]; state.solo=[...o.solo]; state.trackFx=[...o.trackFx];
  state.layer.forEach(id=>compileLayer(id)); buildGrid();         // transport keeps running -> instant live swap
}
function highlightBanks(){ ["A","B","C","D"].forEach(s=>{ const b=$("bank"+s); if(!b) return;
  b.classList.toggle("on", state.bank===s); b.classList.toggle("filled", !!banks[s]); }); }
function bankPress(slot, store){
  if (store){ banks[slot]=snapshot(); try{ localStorage.setItem(BANK_KEY, JSON.stringify(banks)); }catch(e){}
    const b=$("bank"+slot); b.classList.add("store"); setTimeout(()=>b.classList.remove("store"),300); }
  else { if (!banks[slot]) return; applySnapshot(banks[slot]); state.bank=slot; save(); }
  highlightBanks();
}
state.bank = null;
["A","B","C","D"].forEach(s=>{ $("bank"+s).onclick=()=>bankPress(s,false); $("bank"+s).ondblclick=()=>bankPress(s,true); });
highlightBanks();

// output to a 2nd screen (auto-placed) mirroring the live canvas
async function openOutput(){
  let scr = null;
  try { if (window.getScreenDetails){ const sd = await window.getScreenDetails(); scr = sd.screens.find(s=>!s.isPrimary) || sd.currentScreen; } } catch(e){}
  const feat = scr ? `left=${scr.availLeft},top=${scr.availTop},width=${scr.availWidth},height=${scr.availHeight}` : "width=960,height=540";
  const w = window.open("", "vjout", feat);
  if (!w){ alert("Popup blocked — allow popups to use output."); return; }
  w.document.write('<!doctype html><title>VJ Output</title><style>html,body{margin:0;background:#000;overflow:hidden}video{width:100vw;height:100vh;object-fit:contain;background:#000}</style><video id=v autoplay muted playsinline></video>');
  w.document.close();
  if (!canvas.captureStream){ alert("captureStream unsupported in this browser."); return; }
  const v = w.document.getElementById("v"); v.srcObject = canvas.captureStream(60);
  const goFs = () => { try { const el = w.document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen).call(el); } catch(e){} };
  w.addEventListener("load", goFs); setTimeout(goFs, 500);
}
$("output").onclick = openOutput;

addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.code === "Space"){ e.preventDefault(); playStop(); }
  if (e.key.toLowerCase() === "h") $("editor").classList.toggle("hidden");
});

// ---------- boot ----------
load();
$("steps").value = String(state.steps);
loadLayersManifest().then(() => { state.layer.forEach((id)=>compileLayer(id)); buildGrid(); });
buildGrid();
window.__ready = true;
let lastT = performance.now()/1000;

(function loop(){
  const now = performance.now()/1000;
  const dt = Math.min(0.1, now - lastT); lastT = now;
  // TAPE STOP: ramp the transport (and audio pitch) down to a halt, back up on release
  tapeFactor += ((tapeStop ? 0.0 : 1.0) - tapeFactor) * Math.min(1, dt * (tapeStop ? 3.5 : 6.0));
  if (tapeFactor < 0.002) tapeFactor = 0;
  if (state.playing){
    if (fileLoaded && audioEl && !audioEl.paused){
      audioEl.playbackRate = Math.max(0.02, tapeFactor);          // real pitch-down + slow on tape stop
      state.playhead = (audioEl.currentTime / stepDur()) % state.steps;
    } else {
      playAccum += dt * tapeFactor / stepDur();                   // tape-stop scales the synth transport
      state.playhead = (playAccum % state.steps + state.steps) % state.steps;
    }
    // STUTTER: loop a small slice of the sequence while held
    if (stutterOn){ const sz = gateSteps(state.fx.stutter !== undefined ? state.fx.stutter : 0.25);
      state.playhead = stutterAnchor + (((state.playhead - stutterAnchor) % sz) + sz) % sz; }
    // swing: delay odd steps by up to half a step
    const base = Math.floor(state.playhead), frac = state.playhead - base;
    const off = (base % 2 === 1) ? state.swing * 0.5 : 0.0;
    const cur = (((frac >= off ? base : base - 1) % state.steps) + state.steps) % state.steps;
    if (cur !== state.lastStep){
      state.lastStep = cur;
      if (fileLoaded){
        // fill a step only on a band ONSET (a spike above its running average), so each
        // channel reacts to its own content instead of every channel firing on loud songs
        const onset = (b, e, floor) => (b > e * 1.4 + 0.02 && b > floor) ? 1 : 0;
        const voice = onset(bands.mid,    env.mid,    0.08);   // mids
        const drums = onset(bands.treble, env.treble, 0.06);   // highs
        const bass  = onset(bands.bass,   env.bass,   0.10);   // lows
        const seams = (bass && drums) ? 1 : 0;                 // only on a full-spectrum hit
        const fills = [voice, drums, bass, seams];
        for (let c=0;c<state.channels;c++){
          const on = fills[c%NP];
          state.grid[c*state.steps+cur] = on;
          if (on) hitPulse(c, cur);
          const cell = document.querySelector(`.cell[data-c="${c}"][data-s="${cur}"]`);
          if (cell) cell.classList.toggle("on", !!on);
        }
      } else {
        for (let c=0;c<state.channels;c++) if (state.grid[c*state.steps+cur]){
          hitPulse(c, cur);                           // visual ADSR envelope (attack ramp -> release)
          blip(c);                                    // per-channel pitch + note
        }
      }
      markPlayhead(cur);
    }
  }
  for (let c=0;c<state.channels;c++){                         // visual ADSR: attack ramp up, then release decay
    const e = state.adsr[c] || ADSR_DEF;
    const atk = Math.max(0.01, e.a), rel = e.r;
    const ds = Math.max(0.05, (state.noteLen[c]||0.25) * 4 * 60 / state.bpm + rel * 2.0);
    const decay = Math.pow(0.03, dt / ds);
    for (let s=0;s<state.steps;s++){ const i=c*state.steps+s;
      if (rise2d[i] > 0.5){ pulses2d[i] += dt/atk; if (pulses2d[i] >= 1.0){ pulses2d[i]=1.0; rise2d[i]=0; } }  // attack
      else pulses2d[i] *= decay;                                                                              // release
    }
  }
  // GATE: square-wave chop the whole mix at the chosen note rate
  if (gateGain){
    const gv = state.fx.gate || 0;
    if (gv < 0.02) gateGain.gain.value = 1.0;
    else { const per = gateSteps(gv); const ph = (state.playhead % per) / per; gateGain.gain.value = (ph < 0.5) ? 1.0 : 0.06; }
  }
  updateBands();
  uploadPulse();
  const energy = (row) => { if (row >= state.channels) return 0; let m=0; for (let s=0;s<state.steps;s++) m=Math.max(m, pulses2d[row*state.steps+s]); return m; };

  if (canvas.width !== innerWidth || canvas.height !== innerHeight){ canvas.width=innerWidth; canvas.height=innerHeight; }
  renderLayers(now);                                          // multi-pass: object-layers -> atlas

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.useProgram(prog);
  const pos = gl.getAttribLocation(prog, "position");
  gl.bindBuffer(gl.ARRAY_BUFFER, quad); gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
  gl.uniform2f(U("iResolution"), canvas.width, canvas.height);
  gl.uniform1f(U("iTime"), now);
  gl.uniform1f(U("uBass"), bands.bass);
  gl.uniform1f(U("uMid"), bands.mid);
  gl.uniform1f(U("uTreble"), bands.treble);
  gl.uniform1f(U("uSteps"), state.steps);
  gl.uniform1f(U("uChannels"), state.channels);
  gl.uniform1f(U("uEnOpen"), energy(5));
  gl.uniform1f(U("uStrobe"), strobeOn ? 1.0 : 0.0);
  gl.uniform1f(U("uSpiral"), state.fx.spiral || 0.0);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, pulseTex); gl.uniform1i(U("uPulseTex"), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, atlasTex); gl.uniform1i(U("uAtlas"), 1);
  for (let c=0;c<8;c++){
    gl.uniform1f(U("uHasLayer[" + c + "]"), (c < state.channels && layerReady(c)) ? 1.0 : 0.0);
    gl.uniform1f(U("uVis[" + c + "]"), (c < state.channels && visible(c)) ? 1.0 : 0.0);   // M/S drive visibility
    gl.uniform1f(U("uOpacity[" + c + "]"), (c < state.channels) ? (state.opacity[c] !== undefined ? state.opacity[c] : 1.0) : 1.0);
  }
  gl.drawArrays(gl.TRIANGLES, 0, 6);
  requestAnimationFrame(loop);
})();
</script>
