    <canvas id="glcanvas"></canvas>
    <script id="vertex-shader" type="x-shader/x-vertex">attribute vec2 position; void main() { gl_Position = vec4(position, 0.0, 1.0); }</script>
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision highp float; uniform vec2 iResolution; uniform float iTime;

        // Manual scene notes: metal wheelchair cart on tiled sidewalk beside seated man.
        mat2 rot(float a) { float s = sin(a), c = cos(a); return mat2(c, -s, s, c); }
        float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
        float box(vec2 p, vec2 b) { vec2 d = abs(p) - b; return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0); }
        float seg(vec2 p, vec2 a, vec2 b) { vec2 pa = p - a, ba = b - a; float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0); return length(pa - ba * h); }
        float ellipse(vec2 p, vec2 c, vec2 r) { vec2 q = (p - c) / r; return length(q) - 1.0; }
        float stroke(float d, float w) { return smoothstep(w, 0.0, abs(d)); }
        float fill(float d) { return smoothstep(0.018, -0.018, d); }
        vec3 over(vec3 base, vec3 paint, float a) { return mix(base, paint, clamp(a, 0.0, 1.0)); }

        void rectPaint(inout vec3 col, vec2 p, vec2 c, vec2 b, vec3 paint, float a) {
            col = over(col, paint, fill(box(p - c, b)) * a);
        }

        void linePaint(inout vec3 col, vec2 p, vec2 a, vec2 b, vec3 paint, float w, float alpha) {
            col = over(col, paint, smoothstep(w, 0.0, seg(p, a, b)) * alpha);
        }

        void diskPaint(inout vec3 col, vec2 p, vec2 c, float r, vec3 paint, float alpha) {
            col = over(col, paint, fill(length(p - c) - r) * alpha);
        }

        void ringPaint(inout vec3 col, vec2 p, vec2 c, float r, vec3 paint, float w, float alpha) {
            float d = abs(length(p - c) - r);
            col = over(col, paint, smoothstep(w, 0.0, d) * alpha);
        }

        void fakeText(inout vec3 col, vec2 p, vec2 c, vec2 size, vec3 paint, float rows) {
            vec2 q = (p - c) / size;
            if (abs(q.x) < 1.0 && abs(q.y) < 1.0) {
                float row = floor((q.y + 1.0) * rows);
                float glyph = step(0.52, hash(vec2(floor((q.x + 1.0) * 18.0), row)));
                float band = smoothstep(0.10, 0.0, abs(fract((q.y + 1.0) * rows) - 0.5));
                col = over(col, paint, glyph * band * 0.82);
            }
        }

        float ribbonField(vec2 p, float t) {
            float d = 10.0;
            vec2 q = p;
            for (int i = 0; i < 7; i++) {
                float fi = float(i);
                vec2 c = vec2(sin(fi * 2.1 + t * 0.22) * 0.65, cos(fi * 1.7 - t * 0.18) * 0.55);
                vec2 r = (q - c) * rot(fi * 0.75 + sin(t * 0.3 + fi) * 0.18);
                float strand = abs(r.y + sin(r.x * (3.0 + fi * 0.25) + t * (0.8 + fi * 0.06)) * 0.09) - (0.030 + 0.008 * sin(fi));
                d = min(d, strand);
            }
            return d;
        }

        float marchRelief(vec2 p, float t) {
            float acc = 0.0;
            vec2 dir = normalize(vec2(0.72 + 0.10 * sin(t), 0.45));
            vec2 q = p - dir * 0.18;
            for (int i = 0; i < 28; i++) {
                float fi = float(i);
                q += dir * 0.014;
                float wood = abs(sin(q.x * 8.0 + q.y * 5.0 + sin(q.y * 9.0 + t * 0.35) + fi * 0.04));
                float knot = 0.018 / (length(q - vec2(-0.55 + fi * 0.045, -0.10 + sin(fi * 0.7) * 0.22)) + 0.08);
                acc += smoothstep(0.90, 0.18, wood) * 0.018 + knot * 0.010;
            }
            return clamp(acc, 0.0, 1.0);
        }

        float animatedWeave(vec2 p, float t) {
            float waves = sin(p.x * 13.0 + t * 1.7) * sin(p.y * 11.0 - t * 1.2);
            float scan = smoothstep(0.94, 1.0, sin((p.x + p.y) * 18.0 + t * 2.4));
            return smoothstep(0.45, 1.0, waves) * 0.45 + scan * 0.35;
        }

        void addSceneDetails(inout vec3 col, vec2 p, int type, vec3 a, vec3 b, vec3 c, vec3 d, vec3 e, float t) {

                linePaint(col,p,vec2(-0.74,0.78),vec2(-0.46,0.28),vec3(0.42,0.42,0.40),0.018,0.65);

                col += vec3(0.18,0.02,0.01) * smoothstep(0.99,1.0,sin(p.x*18.0+t*2.0)) * fill(box(p-vec2(0.23,-0.25),vec2(0.43,0.22)));
            } else if (type == 1) {

                rectPaint(col,p,vec2(-0.08,-0.62),vec2(0.24,0.055),vec3(0.42,0.12,0.06),1.0);

            } else if (type == 2) {

                rectPaint(col,p,vec2(-0.62,-0.48),vec2(0.09,0.05),vec3(0.06,0.35,0.70),1.0);

                ringPaint(col,p,vec2(0.0,0.0),0.21,vec3(0.01,0.04,0.30),0.012,0.55);
                for(int i=0;i<12;i++){float fi=float(i); float ang=fi*0.523+t*0.05; linePaint(col,p,vec2(0.0),vec2(cos(ang),sin(ang))*0.30,vec3(0.10,0.24,0.95),0.006,0.45);}
            } else if (type == 4) {
                linePaint(col,p,vec2(-1.0,-0.05),vec2(1.0,-0.03),vec3(0.55,0.50,0.43),0.014,0.9);
                for(int i=0;i<18;i++){float fi=float(i); diskPaint(col,p,vec2(-0.88+fi*0.10,0.08+0.06*sin(fi)),0.055,vec3(0.13,0.43,0.17),0.72);}
                fakeText(col,p,vec2(0.0,-0.10),vec2(0.66,0.16),d,5.0);
                rectPaint(col,p,vec2(-0.58,-0.32),vec2(0.03,0.24),vec3(0.74,0.08,0.08),1.0);
                rectPaint(col,p,vec2(-0.58,-0.12),vec2(0.03,0.02),vec3(0.96),1.0);
            } else if (type == 5) {
                rectPaint(col,p,vec2(0.0,0.0),vec2(0.72,0.50),vec3(0.012),0.35);
                for(int i=0;i<16;i++){float fi=float(i); vec2 q=vec2(-0.60+mod(fi,8.0)*0.17,0.43-0.86*floor(fi/8.0)); linePaint(col,p,q,q+vec2(0.09*sin(fi),0.05*cos(fi)),mix(c,d,hash(vec2(fi))),0.018,0.92);}
                fakeText(col,p,vec2(0.45,-0.43),vec2(0.20,0.06),vec3(0.95),1.0);
                for(int i=0;i<6;i++){float fi=float(i); diskPaint(col,p,vec2(-0.20+fi*0.08,0.08+0.08*sin(fi)),0.035,mix(b,c,hash(vec2(fi))),0.9);}
            } else if (type == 6) {
                for(int i=0;i<10;i++){float fi=float(i); linePaint(col,p,vec2(-0.95+fi*0.20,-0.90),vec2(-0.78+fi*0.20,-0.76),vec3(0.72),0.010,0.65);}
                linePaint(col,p,vec2(-0.30,-0.42),vec2(-0.05,0.04),vec3(0.68),0.012,0.95);
                linePaint(col,p,vec2(0.36,-0.42),vec2(0.10,0.02),vec3(0.68),0.012,0.95);
                rectPaint(col,p,vec2(-0.04,0.12),vec2(0.30,0.06),vec3(0.72,0.70,0.64),0.85);
                diskPaint(col,p,vec2(0.58,0.17),0.055,vec3(0.30,0.16,0.10),0.9);

            } else if (type == 7) {
                for(int i=0;i<16;i++){float fi=float(i); linePaint(col,p,vec2(-0.9+fi*0.12,0.88),vec2(-0.86+fi*0.12,0.65),d,0.020,0.7);}
                rectPaint(col,p,vec2(0.0,0.02),vec2(0.58,0.42),vec3(0.78,0.83,0.80),0.25);
                for(int i=0;i<14;i++){float fi=float(i); diskPaint(col,p,vec2(-0.85+fi*0.13,0.76+0.06*sin(t+fi)),0.045,d,0.85);}
                rectPaint(col,p,vec2(0.0,-0.64),vec2(1.1,0.035),vec3(0.92),0.85);

                rectPaint(col,p,vec2(0.0,0.36),vec2(0.82,0.07),vec3(0.45,0.42,0.38),0.55);
                for(int i=0;i<7;i++){float fi=float(i); rectPaint(col,p,vec2(-0.55+fi*0.18,0.10),vec2(0.035,0.018),vec3(0.86,0.84,0.74),0.9);}
                diskPaint(col,p,vec2(-0.28,0.13),0.055,vec3(0.80,0.96,0.12),1.0);
                diskPaint(col,p,vec2(0.23,0.11),0.055,vec3(0.85,0.88,0.10),1.0);
                linePaint(col,p,vec2(-0.60,-0.05),vec2(-0.60,-0.70),c,0.018,1.0);
                linePaint(col,p,vec2(0.50,-0.05),vec2(0.50,-0.70),c,0.018,1.0);
            } else if (type == 9) {
                fakeText(col,p,vec2(0.0,0.25),vec2(0.72,0.16),vec3(0.14,0.05,0.04),3.0);
                for(int i=0;i<20;i++){float fi=float(i); linePaint(col,p,vec2(-0.45+fi*0.045,-0.18),vec2(-0.42+fi*0.045,-0.30),e,0.010,0.7);}
                diskPaint(col,p,vec2(-0.54,-0.16),0.10,vec3(0.04),0.9);
                diskPaint(col,p,vec2(0.54,-0.16),0.10,vec3(0.04),0.9);
                rectPaint(col,p,vec2(0.0,-0.48),vec2(0.28,0.055),d,0.85);
            } else if (type == 10) {
                for(int i=0;i<42;i++){float fi=float(i); vec2 q=vec2(-0.78+hash(vec2(fi))*1.56,-0.48+hash(vec2(fi,2.0))*1.05); diskPaint(col,p,q,0.026+0.018*hash(vec2(fi,3.0)),mix(c,d,hash(vec2(fi,4.0))),0.85);}
                rectPaint(col,p,vec2(0.0,0.36),vec2(0.50,0.055),vec3(0.95,0.86,0.25),0.8);
                fakeText(col,p,vec2(0.0,0.08),vec2(0.40,0.11),vec3(0.95,0.92,0.70),3.0);
            } else if (type == 11) {
                for(int i=0;i<8;i++){float fi=float(i); rectPaint(col,p,vec2(-0.30+fi*0.085,-0.36+0.02*sin(fi)),vec2(0.026,0.018),mix(c,d,hash(vec2(fi))),0.95);}
                rectPaint(col,p,vec2(0.0,-0.53),vec2(0.18,0.035),vec3(0.92),0.7);
                linePaint(col,p,vec2(-0.90,-0.70),vec2(0.90,-0.78),vec3(0.10),0.018,0.8);
                for(int i=0;i<9;i++){float fi=float(i); rectPaint(col,p,vec2(-0.86+fi*0.22,0.48),vec2(0.045,0.22),vec3(0.62,0.66,0.66),0.28);}
            } else if (type == 12) {
                for(int i=0;i<24;i++){float fi=float(i); vec2 q=vec2(-0.86+hash(vec2(fi,6.0))*1.72,-0.74+hash(vec2(fi,9.0))*1.48); ringPaint(col,p,q,0.045+0.04*hash(vec2(fi)),mix(b,c,hash(vec2(fi,2.0))),0.012,0.75);}
                linePaint(col,p,vec2(-0.72,-0.62),vec2(-0.42,-0.42),b,0.035,0.95);
                diskPaint(col,p,vec2(-0.67,-0.60),0.07,b,0.85);
            } else if (type == 13) {
                rectPaint(col,p,vec2(0.0,0.16),vec2(0.42,0.18),vec3(0.06,0.18,0.48),0.55);
                fakeText(col,p,vec2(0.0,0.28),vec2(0.38,0.055),d,1.0);
                for(int i=0;i<18;i++){float fi=float(i); diskPaint(col,p,vec2(-0.62+fi*0.075,-0.61+0.05*sin(fi)),0.025,mix(c,d,hash(vec2(fi))),0.9);}
                linePaint(col,p,vec2(-0.60,0.52),vec2(0.60,0.52),vec3(0.38,0.20,0.10),0.020,0.8);
            } else if (type == 14) {
                rectPaint(col,p,vec2(0.0,0.84),vec2(0.62,0.035),vec3(0.98),0.8);
                for(int i=0;i<22;i++){float fi=float(i); vec2 q=vec2(-0.62+fi*0.055,-0.02+0.15*sin(fi*0.7)); diskPaint(col,p,q,0.018+0.018*hash(vec2(fi)),mix(b,c,hash(vec2(fi,3.0))),0.75);}
                linePaint(col,p,vec2(-0.70,-0.36),vec2(0.68,-0.36),vec3(0.72,0.62,0.48),0.018,0.55);
                col += vec3(0.18,0.10,0.05) * marchRelief(p*1.4 + vec2(0.1,-0.1), t) * 0.45;

                rectPaint(col,p,vec2(-0.18,0.38),vec2(0.06,0.18),vec3(0.20,0.16,0.12),0.7);
                rectPaint(col,p,vec2(0.62,0.12),vec2(0.05,0.14),vec3(0.86,0.82,0.72),0.65);
            } else if (type == 16) {
                rectPaint(col,p,vec2(0.0,0.0),vec2(0.52,0.70),vec3(0.06,0.04,0.03),0.20);
                for(int i=0;i<6;i++){float fi=float(i); linePaint(col,p,vec2(-0.42+fi*0.17,-0.66),vec2(-0.42+fi*0.17,0.64),vec3(0.98),0.010,0.65);}
                linePaint(col,p,vec2(-0.32,-0.16),vec2(0.0,-0.40),vec3(0.98),0.016,0.9);
                linePaint(col,p,vec2(0.32,-0.16),vec2(0.0,-0.40),vec3(0.98),0.016,0.9);
            } else if (type == 17) {
                for(int i=0;i<120;i++){float fi=float(i); diskPaint(col,p,vec2(-1.0+hash(vec2(fi,8.0))*2.0,-0.85+hash(vec2(fi,9.0))*1.7),0.012+0.020*hash(vec2(fi,3.0)),mix(a,c,hash(vec2(fi,4.0))),0.5);}
                rectPaint(col,p,vec2(-0.35,-0.36),vec2(0.18,0.25),vec3(0.03),0.75);
                rectPaint(col,p,vec2(0.35,-0.36),vec2(0.18,0.25),vec3(0.03),0.75);
                linePaint(col,p,vec2(-0.86,0.74),vec2(0.86,0.82),vec3(0.82),0.018,0.65);
                rectPaint(col,p,vec2(0.0,-0.82),vec2(0.34,0.045),vec3(0.86,0.82,0.72),0.75);
            } else if (type == 18) {
                for(int i=0;i<28;i++){float fi=float(i); vec2 q=vec2(-0.96+mod(fi,7.0)*0.32,-0.70+floor(fi/7.0)*0.34); ringPaint(col,p,q,0.055+0.025*hash(vec2(fi)),mix(b,d,hash(vec2(fi,3.0))),0.014,0.55);}
                for(int i=0;i<18;i++){float fi=float(i); linePaint(col,p,vec2(-0.92+fi*0.11,0.84),vec2(-0.84+fi*0.11,0.76),vec3(0.94),0.012,0.4);}
            } else {
                rectPaint(col,p,vec2(0.0,0.0),vec2(0.88,0.54),vec3(0.36,0.05,0.04),0.35);
                for(int i=0;i<11;i++){float fi=float(i); linePaint(col,p,vec2(-0.93+fi*0.19,-0.56),vec2(-0.11+fi*0.21,0.52),b*1.25,0.012,0.95);}
                for(int i=0;i<12;i++){float fi=float(i); linePaint(col,p,vec2(-0.93+fi*0.19,0.52),vec2(-0.11+fi*0.21,-0.56),b*1.15,0.012,0.95);}
                for(int i=0;i<24;i++){float fi=float(i); diskPaint(col,p,vec2(-0.88+fi*0.076,-0.49+0.028*sin(fi+t)),0.026,vec3(0.98,0.95,0.86),0.92);}
                rectPaint(col,p,vec2(0.0,0.64),vec2(0.88,0.035),vec3(0.72,0.66,0.38),0.85);

        }

       void main() {
            vec2 uv = gl_FragCoord.xy / iResolution.xy;
            vec2 p = uv * 2.0 - 1.0;
            p.x *= iResolution.x / iResolution.y;
            float t = iTime;

            vec3 a = vec3(0.580, 0.580, 0.550);
            vec3 b = vec3(0.280, 0.280, 0.270);
            vec3 c = vec3(0.880, 0.860, 0.780);
            vec3 d = vec3(0.120, 0.130, 0.150);
            vec3 e = vec3(0.620, 0.420, 0.300);
            vec3 col = mix(a, b, uv.y);
            int type = 6;
            vec2 animP = p + 0.025 * vec2(sin(t * 0.7 + p.y * 4.0), cos(t * 0.6 + p.x * 3.0));

            float vignette = smoothstep(1.35, 0.15, length(p));
            col *= 0.72 + 0.28 * vignette;

            if (type == 0) {
                col = mix(vec3(0.80,0.77,0.67), vec3(0.08,0.08,0.09), smoothstep(-0.2, -0.75, p.y));
                rectPaint(col, p, vec2(-0.95,0.02), vec2(0.24,1.1), vec3(0.90,0.86,0.76), 1.0);
                fakeText(col, p, vec2(-1.02,0.17), vec2(0.16,0.48), c, 4.0);
                diskPaint(col, p, vec2(-0.53,-0.68), 0.28, vec3(0.025), 1.0);
                ringPaint(col, p, vec2(-0.53,-0.68), 0.30, vec3(0.20), 0.030, 1.0);
                linePaint(col, p, vec2(-0.62,-0.46), vec2(0.24,-0.02), vec3(0.08), 0.055, 1.0);
                rectPaint(col, p, vec2(0.24,-0.30), vec2(0.42,0.20), b, 1.0);
                rectPaint(col, p, vec2(0.22,-0.02), vec2(0.46,0.13), vec3(0.98,0.96,0.90), 1.0);
                rectPaint(col, p, vec2(-0.05,-0.42), vec2(0.22,0.32), b, 0.96);
                fakeText(col, p, vec2(-0.05,-0.47), vec2(0.14,0.18), d, 3.0);
                col += b * (0.06 * sin(t * 4.0 + p.x * 8.0));
            } else if (type == 1) {
                col = vec3(0.025,0.025,0.035) + 0.08 * vec3(hash(floor((p+t*0.03)*20.0)));
