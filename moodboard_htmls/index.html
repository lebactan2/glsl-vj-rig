<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shader Showcase Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.5);
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
        }

        .sidebar-header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .sidebar-header p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 300;
        }

        #searchInput {
            width: 100%;
            padding: 10px 12px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .custom-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .custom-row button {
            flex: 1;
            padding: 9px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid var(--accent-glow);
            color: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .custom-row button:hover {
            background: rgba(56, 189, 248, 0.25);
        }

        .hint-keys {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 11px;
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Scrollbar */
        .item-list::-webkit-scrollbar {
            width: 6px;
        }

        .item-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .item-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .item {
            padding: 14px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .item.active {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-weight: 600;
            font-size: 28px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .panels-container {
            display: flex;
            flex: 1;
            gap: 30px;
            min-height: 0;
        }

        .panel {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .panel-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .panel-content {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        img.preview,
        iframe.preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
            transition: opacity 0.5s ease;
        }

        /* Loading Overlay */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            z-index: 5;
        }

        .loading .loader {
            display: block;
        }

        .loading .preview {
            opacity: 0.3;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Shader Showcase</h1>
            <p>166 Procedural Conversions</p>
            <input type="text" id="searchInput" placeholder="Search name or content (e.g. forest, arrow)...">
            <div class="custom-row">
                <button id="openShaderBtn">📂 Open shader</button>
                <button id="openImageBtn">🖼 Open image</button>
            </div>
            <div class="hint-keys">↑ / ↓ cycle visuals · buttons open the selected file's folder (local) or GitHub page (online)</div>
        </div>
        <div class="item-list" id="itemList">
            <!-- Items generated by JS -->
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="mainTitle">Select an image to preview</h2>
        </div>

        <div class="panels-container">
            <div class="panel">
                <div class="panel-header">Original Photo</div>
                <div class="panel-content" id="imgContainer">
                    <div class="loader"></div>
                    <img id="imgView" class="preview" src="" alt="Original Photo" style="display: none;">
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Procedural Shader</div>
                <div class="panel-content" id="htmlContainer">
                    <div class="loader"></div>
                    <iframe id="htmlView" class="preview" src="" style="display: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        const basenames = ["IMG_0398", "IMG_0415", "IMG_0417", "IMG_0418", "IMG_0419", "IMG_0586", "IMG_0767", "IMG_0824", "IMG_0825", "IMG_0826", "IMG_0965", "IMG_0967", "IMG_0973", "IMG_0986", "IMG_0992", "IMG_0995", "IMG_1011", "IMG_1014", "IMG_1061", "IMG_1072", "IMG_1077", "IMG_1121", "IMG_1126", "IMG_1151", "IMG_1183", "IMG_1185", "IMG_1213", "IMG_1240", "IMG_1241", "IMG_1276", "IMG_1300", "IMG_1301", "IMG_1306", "IMG_1308", "IMG_1309", "IMG_1323", "IMG_1333", "IMG_1348", "IMG_1399", "IMG_1415", "IMG_1426", "IMG_1449", "IMG_1621", "IMG_1644", "IMG_1663", "IMG_1714", "IMG_1718", "IMG_1720", "IMG_1721", "IMG_1725", "IMG_1847", "IMG_2148", "IMG_2249", "IMG_2250", "IMG_2263", "IMG_2450", "IMG_2477", "IMG_2586", "IMG_2700", "IMG_2703", "IMG_2745", "IMG_2768", "IMG_2773", "IMG_2982", "IMG_3105", "IMG_3714", "IMG_3922", "IMG_4080", "IMG_4742", "IMG_4782", "IMG_4783", "IMG_4784", "IMG_5181", "IMG_5206", "IMG_5211", "IMG_5212", "IMG_5214", "IMG_5215", "IMG_5225", "IMG_5251", "IMG_5320", "IMG_5326", "IMG_5346", "IMG_5506", "IMG_5517", "IMG_5538", "IMG_5569", "IMG_6550", "IMG_6551", "IMG_6574", "IMG_6609", "IMG_6693", "IMG_6694", "IMG_6695", "IMG_6697", "IMG_6755", "IMG_6786", "IMG_6793", "IMG_6876", "IMG_6994", "IMG_7211", "IMG_7225", "IMG_7266", "IMG_7408", "IMG_7409", "IMG_7410", "IMG_7680", "IMG_7681", "IMG_7682", "IMG_7683", "IMG_7684", "IMG_7685", "IMG_7686", "IMG_7694", "IMG_9792", "IMG_9812", "IMG_9813"];
        const trippyBasenames = [];
        const batch1Basenames = ["IMG_9786", "IMG_9787", "IMG_9868", "IMG_9869", "IMG_6349", "IMG_6350", "IMG_6385", "IMG_6442", "IMG_6444", "IMG_6469", "IMG_6494", "IMG_6495", "IMG_6496", "IMG_6516", "IMG_6527", "IMG_6529", "IMG_6581", "IMG_8926", "IMG_8953", "IMG_9015", "IMG_9017", "IMG_9031", "IMG_9072", "IMG_9074", "IMG_9077", "IMG_9078"];
        const batch2Basenames = ["IMG_0187", "IMG_0188", "IMG_4841", "IMG_5132", "IMG_5146", "IMG_5373", "IMG_5527", "IMG_5577", "IMG_5614", "IMG_5620", "IMG_5636", "IMG_5662", "IMG_5689", "IMG_5693", "IMG_5700", "IMG_5702", "IMG_5715", "IMG_5761", "IMG_5762", "IMG_6006", "IMG_6007", "IMG_6291", "IMG_6348"];

        const itemList = document.getElementById('itemList');
        const imgView = document.getElementById('imgView');
        const htmlView = document.getElementById('htmlView');
        const mainTitle = document.getElementById('mainTitle');
        const imgContainer = document.getElementById('imgContainer');
        const htmlContainer = document.getElementById('htmlContainer');
        const searchInput = document.getElementById('searchInput');

        let activeItem = null;

        function createItem(name, folder, isManual = false) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span>${name}${isManual ? ' (Manual)' : ''}</span> <span>â†’</span>`;
            div.onclick = () => selectItem(div, name, folder, isManual);
            itemList.appendChild(div);
        }

        batch1Basenames.forEach(name => createItem(name, 'trippy_ornaments_manual/', true));
        batch2Basenames.forEach(name => createItem(name, 'trippy_ornaments_manual_batch2/', true));
        basenames.forEach(name => createItem(name, ''));
        trippyBasenames.forEach(name => createItem(name, 'trippy_ornaments_all/'));

        function selectItem(element, name, folder, isManual) {
            if (activeItem) activeItem.classList.remove('active');
            activeItem = element;
            activeItem.classList.add('active');

            mainTitle.textContent = name + (isManual ? ' (Manual Shader)' : '');

            imgContainer.classList.add('loading');
            htmlContainer.classList.add('loading');

            imgView.style.display = 'block';
            htmlView.style.display = 'block';

            if (isManual) {
                imgView.src = `trippy_ornaments_all/assets/${name}.jpg`;
                htmlView.src = `${folder}${name}_manual.html`;
            } else {
                imgView.src = `${folder}assets/${name}.jpg`;
                htmlView.src = `${folder}${name}.html`;
            }
        }

        imgView.onload = () => imgContainer.classList.remove('loading');
        htmlView.onload = () => htmlContainer.classList.remove('loading');

        // full-text search index (shader content words); loaded lazily
        let searchIndex = {};
        fetch('search_index.json').then(r => r.ok ? r.json() : {}).then(j => { searchIndex = j; });

        searchInput.addEventListener('input', (e) => {
            const tokens = e.target.value.toLowerCase().split(/\s+/).filter(Boolean);
            const items = itemList.getElementsByClassName('item');
            for (let item of items) {
                const name = item.querySelector('span').textContent.toLowerCase();
                const hay = name + ' ' + (searchIndex[name.replace(/\s.*$/, '')] || '');
                const match = tokens.every(t => hay.includes(t));   // every word must match (name OR content)
                item.style.display = match ? 'flex' : 'none';
            }
        });

        // --- Up / Down to cycle through the visible (filtered) list ---
        function visibleItems() {
            return [...itemList.getElementsByClassName('item')].filter(it => it.style.display !== 'none');
        }
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
            const tag = (document.activeElement && document.activeElement.tagName) || '';
            if (/INPUT|TEXTAREA|SELECT/.test(tag)) return; // don't hijack the search box
            const items = visibleItems();
            if (!items.length) return;
            e.preventDefault();
            let idx = items.indexOf(activeItem); // -1 when a custom shader is showing
            idx = (idx + (e.key === 'ArrowDown' ? 1 : -1) + items.length) % items.length;
            items[idx].click();
            items[idx].scrollIntoView({ block: 'nearest' });
        });

        // --- Open the selected file's containing folder (local) or GitHub page (online) ---
        const GITHUB_REPO = 'https://github.com/lebactan2/glsl-vj-rig';
        const isOnline = () => location.hostname.endsWith('github.io') || /\.(app|dev|com|net|io)$/.test(location.hostname);

        function openLocation(fileSrc, kind) {
            if (!fileSrc) { alert('Select an item first.'); return; }
            const u = new URL(fileSrc, location.href);
            if (isOnline()) {
                // map the served path to the GitHub repo tree, dropping the Pages project base (repo name)
                const parts = u.pathname.split('/').filter(Boolean);
                if (parts.length && parts[0] === 'glsl-vj-rig') parts.shift();
                parts.pop(); // drop the filename -> folder
                window.open(`${GITHUB_REPO}/tree/main/${parts.join('/')}`, '_blank');
            } else {
                // local: open the containing directory
                u.pathname = u.pathname.replace(/[^/]*$/, '');
                u.search = ''; u.hash = '';
                window.open(u.href, '_blank');
            }
        }

        document.getElementById('openShaderBtn').onclick = () =>
            openLocation(activeItem ? htmlView.getAttribute('src') : null, 'shader');
        document.getElementById('openImageBtn').onclick = () =>
            openLocation(activeItem ? imgView.getAttribute('src') : null, 'image');

        const firstItem = itemList.querySelector('.item');
        if (firstItem) {
            firstItem.click();
        }
    </script>
</body>

</html>
