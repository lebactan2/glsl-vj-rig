    const lockBtn = document.createElement("button"); lockBtn.className = "ms lock" + (state.lock[c]?" on":""); lockBtn.textContent = "🔒"; lockBtn.title = "lock track"; lockBtn.draggable = false;

    const kD = makeKnob({label:"D", value:adsr.d, def:ADSR_DEF.d, onInput:v=>{adsr.d=v;save();}, isLocked});

    const fxBtn = document.createElement("button"); fxBtn.className = "ms fx"; fxBtn.textContent = "⚙"; fxBtn.title = "ADSR + pitch (click to open/collapse)"; fxBtn.draggable = false;

    const fxslot = document.createElement("div");
    const renderFxSlot = () => {

      fxslot.className = "fxslot" + (sp ? " set" : "");
      fxslot.title = sp ? `${sp.label}: tweak this FX here; right-click clear` : "drop a master-FX knob here to apply it to this track";
      if (!sp) { fxslot.textContent = "FX"; return; }

        label: sp.label,

    const gsel = document.createElement("input"); gsel.className = "lsel"; gsel.setAttribute("list", "layerlist");

        if (state.grid[i] !== targetVal) {
          state.grid[i] = targetVal; cell.classList.toggle("on", !!targetVal); save();
        }
      });
      cells.appendChild(cell);
    }
    
    lane.appendChild(grip);

    lane.appendChild(nsel); lane.appendChild(fxBtn); lane.appendChild(fxslot);

}

// Lightweight in-place refresh — updates only mutable visuals (cell on/off + layer field)
// without tearing down and rebuilding lane DOM. Use when lane STRUCTURE is unchanged
// (rand, applyPhoto, pattern recall) to avoid the buildGrid() main-thread stall.
function refreshGrid(){
  const wrap = $("grid");
  const lanes = wrap.querySelectorAll(".lane");
  if (lanes.length !== state.channels){ buildGrid(); return; }   // structure changed → full rebuild
  for (let c=0;c<state.channels;c++){
    const lane = lanes[c];
    const cells = lane.querySelectorAll(".cells .cell");
    for (let s=0;s<cells.length;s++) cells[s].classList.toggle("on", !!state.grid[c*state.steps+s]);
    const gsel = lane.querySelector(".lsel");
    if (gsel && document.activeElement !== gsel)
      gsel.value = state.layer[c] && LAYERS[state.layer[c]] ? LAYERS[state.layer[c]].label : "";
  }
}

function reorderChannel(from, to){
  if (from === to) return;
  const S = state.steps;
  const move = (a) => { const v = a.splice(from,1)[0]; a.splice(to,0,v); };
  move(state.names); move(state.pitch); move(state.noteLen); move(state.layer); move(state.inst);
  move(state.adsr); move(state.opacity); move(state.vol); move(state.mute); move(state.solo); move(state.trackFx); move(state.lock);
  const rows = (buf, Ctor) => { const r=[]; for (let c=0;c<state.channels;c++) r.push(buf.slice(c*S,(c+1)*S)); const v=r.splice(from,1)[0]; r.splice(to,0,v);
    const out = new Ctor(state.channels*S); r.forEach((row,c)=>out.set(row,c*S)); return out; };
  state.grid = rows(state.grid, Uint8Array);
  pulses2d  = rows(pulses2d, Float32Array);
  rise2d    = rows(rise2d, Float32Array);
  buildGrid(); save();
}

function setSteps(n){
  const old = state.steps, g = new Uint8Array(state.channels*n);
  for (let c=0;c<state.channels;c++) for (let s=0;s<Math.min(old,n);s++) g[c*n+s]=state.grid[c*old+s];
  state.steps = n; state.grid = g; pulses2d = new Float32Array(state.channels*n); rise2d = new Float32Array(state.channels*n);
  state.lastStep = -1; buildGrid(); save();
}

function markPlayhead(step){
  document.querySelectorAll(".cell.play").forEach(e=>e.classList.remove("play"));
  if (step < 0) return;
  document.querySelectorAll(`.cell[data-s="${step}"]`).forEach(e=>e.classList.add("play"));
}

// ---------- persistence ----------
function save(){ try{ localStorage.setItem("photoCutoutSeq1", JSON.stringify({
  steps:state.steps, channels:state.channels, names:state.names, bpm:state.bpm,
  pitch:state.pitch, noteLen:state.noteLen, layer:state.layer, inst:state.inst,
  adsr:state.adsr, opacity:state.opacity, vol:state.vol, mute:state.mute, solo:state.solo, trackFx:state.trackFx, lock:state.lock,
  swing:state.swing, reverb:state.reverb, master:state.master, fx:state.fx, fxFilter, echo:echoLevel,
  activePhoto:state.activePhoto, grid:Array.from(state.grid) })); }catch(e){} }
function load(){ try{ const d = JSON.parse(localStorage.getItem("photoCutoutSeq1"));
  if(!d) {
    state.activePhoto = "";
    state.layer = Array.from({length: state.channels}, () => "");
    pulses2d = new Float32Array(state.channels*state.steps);
    rise2d = new Float32Array(state.channels*state.steps);
    return;
  }
  const N = d.channels;
  state.steps=d.steps; state.channels=N; state.names=d.names||FULL_NAMES.slice(0,N);
  state.bpm=d.bpm||120; state.grid=Uint8Array.from(d.grid);
  state.pitch=d.pitch||Array.from({length:N},()=>0);
  state.noteLen=d.noteLen||Array.from({length:N},()=>0.25);
  state.layer=d.layer||Array.from({length:N},()=>"");
  state.inst=d.inst||Array.from({length:N},(_,c)=>INSTRUMENTS[c%8][1]);
  state.adsr = d.adsr || Array.from({length:N},()=>({...ADSR_DEF}));
  state.opacity = d.opacity || Array.from({length:N},()=>1);
  state.vol = d.vol || Array.from({length:N},()=>1);
  state.mute = d.mute || Array.from({length:N},()=>0);
  state.solo = d.solo || Array.from({length:N},()=>0);
  state.lock = d.lock || Array.from({length:N},()=>0);
  state.trackFx = d.trackFx || Array.from({length:N},()=>"");
  state.swing = d.swing||0; state.reverb = d.reverb||0; state.master = (d.master!==undefined?d.master:1); state.fx = d.fx||{};
  fxFilter=d.fxFilter||0; echoLevel = (d.echo!==undefined ? d.echo : 0);
  state.activePhoto = d.activePhoto || "";
  pulses2d = new Float32Array(state.channels*state.steps); rise2d = new Float32Array(state.channels*state.steps); }catch(e){} }

// ---------- transport ----------
const stepDur = () => 60 / state.bpm / state.stepsPerBeat;
async function playStop(){
  state.playing = !state.playing;
  $("play").textContent = state.playing ? "⏸ pause" : "▶ play";
  if (state.playing){
    initAudio(); if (actx) actx.resume();
    await ensureMidi({silent:true});
    if (fileLoaded && audioEl) audioEl.play().catch(()=>{});
    else state.startTime = performance.now()/1000 - state.playhead*stepDur();
    if (midiClockOn) startMidiClock(true);
    startScheduler();
  } else { 
    if (fileLoaded && audioEl) audioEl.pause(); 
    stopMidiClock(true);
    stopScheduler();
  }
}

// ---------- master FX rack ----------
const pct = v => Math.round(v*100) + "%";
const NOTE_DIVS = [["1/2",16],["1/4",8],["1/8",4],["1/16",2],["1/32",1],["1/64",0.5]];
function gateInfo(v){ const i = Math.min(NOTE_DIVS.length-1, Math.max(0, Math.round(v*(NOTE_DIVS.length-1)))); return NOTE_DIVS[i]; }
function gateDiv(v){ return gateInfo(v)[0]; }
function gateSteps(v){ return Math.max(1, Math.round(gateInfo(v)[1])); }
const FX_SPEC = [
  { k:"bpm",     label:"BPM",     min:60, max:200, def:120, fmt:v=>Math.round(v), wired:true,
    set:v=>{ state.bpm=Math.round(v); if(state.playing) state.startTime=performance.now()/1000 - state.playhead*stepDur(); } },
  { k:"filter",  label:"FILTER",  min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ fxFilter=v; initAudio(); applyFilter(v); } },
  { k:"delay",   label:"DELAY",   min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ echoLevel=v; initAudio(); applyEcho(v); } },
  { k:"reverb",  label:"REVERB",  min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.reverb=v; initAudio(); applyReverb(v); } },
  { k:"swing",   label:"SWING",   min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.swing=v; } },
  { k:"master",  label:"VOL",     min:0, max:1.5, def:1, fmt:pct, wired:true, set:v=>{ state.master=v; initAudio(); applyMaster(v); } },
  { k:"tremolo", label:"TREMOLO", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.tremolo=v; initAudio(); applyTremolo(v); } },
  { k:"trans",   label:"TRANS",   min:-12, max:12, def:0, fmt:v=>Math.round(v), wired:true, set:v=>{ state.fx.trans=Math.round(v); } },
  { k:"flanger", label:"FLANGER", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.flanger=v; initAudio(); applyFlanger(v); } },
  { k:"phaser", label:"PHASER", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.phaser=v; initAudio(); applyPhaser(v); } },
  { k:"roll", label:"ROLL", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.roll=v; } },
  { k:"pitch",   label:"PITCH",   min:-12, max:12, def:0, fmt:v=>Math.round(v), wired:true, set:v=>{ state.fx.pitch=Math.round(v); } },
  { k:"spiral",  label:"SPIRAL",  min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.spiral=v; } },
  { k:"distort", label:"DISTORT", min:0, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.distort=v; initAudio(); applyDistort(v); } },
  { k:"hi",      label:"HI",      min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.hi=v; initAudio(); applyEQ(); } },
  { k:"mid",     label:"MID",     min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.mid=v; initAudio(); applyEQ(); } },
  { k:"lo",      label:"LO",      min:-1, max:1, def:0, fmt:pct, wired:true, set:v=>{ state.fx.lo=v; initAudio(); applyEQ(); } },
  { k:"gate",    label:"GATE",    min:0, max:1, def:0, fmt:v=>v<0.02?"off":gateDiv(v), wired:true, set:v=>{ state.fx.gate=v; } },
  { k:"stutter", label:"SLICE",   min:0, max:1, def:0.25, fmt:v=>gateDiv(v), wired:true, set:v=>{ state.fx.stutter=v; } },
];
const fxKnobs = {};
const fxrack = $("fxrack");
const fxCurrent = (sp) => sp.k==="bpm"?state.bpm : sp.k==="filter"?fxFilter : sp.k==="delay"?echoLevel
  : sp.k==="reverb"?state.reverb : sp.k==="swing"?state.swing : sp.k==="master"?state.master
  : (state.fx[sp.k]!==undefined?state.fx[sp.k]:(sp.def||0));

function randomChoice(items){ return items[Math.floor(Math.random() * items.length)]; }

// Random pattern generator - changes step pattern and visual layers only.
$("rand").onclick = () => {
  const dens = [0.5,0.25,0.4,0.2,0.6,0.3,0.5,0.3];
  const allLayerIds = Object.keys(LAYERS).filter(id => id !== "__clear__");
  for (let c=0;c<state.channels;c++){
    if (state.lock[c]) continue;
    const d = dens[c%8];
    for (let s=0;s<state.steps;s++){
      const beat = (s % state.stepsPerBeat) === 0;
      state.grid[c*state.steps+s] = (Math.random() < d*(beat?1.5:0.6)) ? 1 : 0;
    }
    if (allLayerIds.length > 0) {
      const randomId = randomChoice(allLayerIds);
      state.layer[c] = randomId;
      compileLayer(randomId);
    }
  }
  buildGrid(); save();
};

function applyPhoto(photoId) {
  const photo = CUTOUT_PHOTOS.find(p => p.id === photoId);
  if (!photo) return;
  state.activePhoto = photoId;
  for (let c = 0; c < state.channels; c++) {
    if (state.lock[c]) continue;
    if (c < photo.layers.length) {
      const layerName = photo.layers[c];
      const cleanName = layerName.replace(/\s+/g, "");
      const id = `${photo.id}#${cleanName}`;
      state.layer[c] = id;
      compileLayer(id);
    } else {
      state.layer[c] = "";
    }
  }
  refreshGrid();
  save();
}

const bankKey = (slot) => "photoCutoutSeqPat_" + slot;
function bankSave(slot){
  const btn = $("bank" + slot);
  localStorage.setItem(bankKey(slot), JSON.stringify({ steps:state.steps, grid:Array.from(state.grid) }));
  if (btn){ btn.classList.add("filled", "on"); setTimeout(()=>btn.classList.remove("on"), 300); }
}
function bankLoad(slot){
  const d = localStorage.getItem(bankKey(slot)); if (!d) return;
  try { const o = JSON.parse(d);
    const stepsChanged = o.steps !== state.steps;
    if (stepsChanged){ state.steps=o.steps; $("steps").value=String(o.steps); pulses2d=new Float32Array(state.channels*o.steps); rise2d=new Float32Array(state.channels*o.steps); }
    state.grid = Uint8Array.from(o.grid); state.lastStep=-1;
    if (stepsChanged) buildGrid(); else refreshGrid();   // steps changed = structural rebuild; else cheap refresh
    save();
  } catch(e){}
}
function bankClear(slot){
  localStorage.removeItem(bankKey(slot));
  const btn = $("bank" + slot); if (btn) btn.classList.remove("filled", "on");
}
// Smart click: empty bank → SAVE current pattern; filled bank → LOAD it; right-click → clear.
["A", "B", "C", "D"].forEach(slot => {
  const btn = $("bank" + slot);
  if (!btn) return;
  if (localStorage.getItem(bankKey(slot))) btn.classList.add("filled");   // reflect stored state on boot
  btn.title = "empty: click to SAVE · filled: click to LOAD · right-click to clear";
  btn.onclick = () => { if (localStorage.getItem(bankKey(slot))) bankLoad(slot); else bankSave(slot); };
  btn.oncontextmenu = (e) => { e.preventDefault(); bankClear(slot); };
});

const isCutout = (id) => id && id.startsWith("IMG_");

// Show a layer in the green preview panel. Photo cutouts show their PNG; GLSL/pattern layers
// have no image, so show placeholder text instead of a broken <img>.
function showLayerPreview(layerId) {
  previewLayerId = layerId || "";
  const img = $("cutout-preview-img"), cv = $("previewCanvas"), placeholder = $("cutout-preview-placeholder");
  if (!img || !cv || !placeholder) return;
  const L = layerId && LAYERS[layerId];
  const url = L && (L.url || (L.fileBase && isCutout(L.id) ? `cutouts/${L.fileBase}/${L.name.replace(/\s+/g, "")}.png` : null));
  if (url) {
    img.src = url; img.style.display = "block"; cv.style.display = "none"; placeholder.style.display = "none";
  } else if (L && (L.builtin || L.externalHtml || (window.FILE_GLOBALS && window.FILE_GLOBALS[L.fileBase]))) {
    img.style.display = "none"; cv.style.display = "block"; placeholder.style.display = "none"; placeholder.textContent = "";
  } else {
    img.style.display = "none"; cv.style.display = "none"; placeholder.style.display = "block";

  }

// Assign a layer id to the active channel and sync its lane input.

  const gsel = document.querySelector(`.lane[data-c="${i}"] .lsel`);

function setActiveChannel(idx) {

let prevGL = null, prevQuad = null;
const prevProgs = {};
function previewCompile(id) {
  if (prevProgs[id] !== undefined) return prevProgs[id];
  const L = LAYERS[id];
  const g = prevGL;
  let frag = null;
  if (L && L.builtin) {
    const el = document.getElementById("layer-" + L.builtin);
    if (el) frag = PATTERN_HEADER + "\n" + el.textContent;
  } else if (L && L.externalHtml) {
    prevProgs[id] = "pending";
    fetch(L.externalHtml).then(r => r.text()).then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const fragScript = doc.getElementById("fragment-shader") || doc.querySelector("script[type='x-shader/x-fragment']");
      if (!fragScript) return;
      let src = fragScript.textContent;
      if (!src.includes("void main")) src = PATTERN_HEADER + "\n" + src;
      const v = g.createShader(g.VERTEX_SHADER); g.shaderSource(v, VERT); g.compileShader(v);
      const f = g.createShader(g.FRAGMENT_SHADER); g.shaderSource(f, src); g.compileShader(f);
      if (!g.getShaderParameter(f, g.COMPILE_STATUS)) return;
      const p = g.createProgram(); g.attachShader(p, v); g.attachShader(p, f); g.linkProgram(p);
      prevProgs[id] = g.getProgramParameter(p, g.LINK_STATUS) ? p : null;
    }).catch(() => { prevProgs[id] = null; });
    return "pending";
  } else if (L) {
    const src = window.FILE_GLOBALS && window.FILE_GLOBALS[L.fileBase];
    if (src && L.fn) {
      frag = LAYER_HEADER + "\n" + src + `\nvoid main(){ vec2 uv = gl_FragCoord.xy / iResolution.xy; vec4 c = ${L.fn}(uv); gl_FragColor = c; }`;
    }
  }
  if (!frag) return prevProgs[id] = null;
  
  try {
    const v = g.createShader(g.VERTEX_SHADER); g.shaderSource(v, VERT); g.compileShader(v);
    const f = g.createShader(g.FRAGMENT_SHADER); g.shaderSource(f, frag); g.compileShader(f);
    if (!g.getShaderParameter(f, g.COMPILE_STATUS)) { console.error("preview shader compilation failed", g.getShaderInfoLog(f)); return prevProgs[id] = null; }
    const p = g.createProgram(); g.attachShader(p, v); g.attachShader(p, f); g.linkProgram(p);
    return prevProgs[id] = g.getProgramParameter(p, g.LINK_STATUS) ? p : null;
  } catch (e) {
    console.error("preview shader compilation error", e);
    return prevProgs[id] = null;
  }
}

function renderPreview(now) {
  const cv = $("previewCanvas"), img = $("cutout-preview-img"), placeholder = $("cutout-preview-placeholder");
  if (!cv) return;
  const id = previewLayerId || state.layer[activeChannelIndex];
  const L = id && LAYERS[id];
  const imageUrl = L && L.url;
  const isGlsl = L && !imageUrl && (L.builtin || L.externalHtml || (window.FILE_GLOBALS && window.FILE_GLOBALS[L.fileBase]));
  
  if (imageUrl) {
    if (img) { if (img.src !== new URL(imageUrl, location.href).href) img.src = imageUrl; img.style.display = "block"; }
    cv.style.display = "none";
    if (placeholder) { placeholder.style.display = "none"; placeholder.textContent = ""; }
    return;
  }
  if (!id || !isGlsl) {
    cv.style.display = "none";
    if (img) img.style.display = "none";
    if (placeholder) { placeholder.style.display = "block"; placeholder.textContent = L ? (L.label + " � no preview") : "Select a Layer"; }
    return;
  }
  
  cv.style.display = "block";
  if (img) img.style.display = "none";
  if (placeholder) { placeholder.style.display = "none"; placeholder.textContent = ""; }
  if (!prevGL) {
    prevGL = cv.getContext("webgl", { premultipliedAlpha: false, alpha: true });
    if (!prevGL) return;
    prevQuad = prevGL.createBuffer();
    prevGL.bindBuffer(prevGL.ARRAY_BUFFER, prevQuad);
    prevGL.bufferData(prevGL.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), prevGL.STATIC_DRAW);
  }
  
  const prog = previewCompile(id);
  if (prog === "pending") {
    return;
  }
  if (!prog) {
    cv.style.display = "none";
    if (placeholder) {
      placeholder.style.display = "block";
      placeholder.textContent = L.label + " (Compile Error)";
    }
    return;
  }
  
  const g = prevGL;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const w = Math.max(16, Math.round((cv.clientWidth || 320) * dpr)), h = Math.max(16, Math.round((cv.clientHeight || 180) * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  
  g.viewport(0, 0, cv.width, cv.height);
  g.clearColor(0, 0, 0, 0);
  g.clear(g.COLOR_BUFFER_BIT);
  
  g.useProgram(prog);
  g.bindBuffer(g.ARRAY_BUFFER, prevQuad);
  const lp = g.getAttribLocation(prog, "position");
  g.enableVertexAttribArray(lp);
  g.vertexAttribPointer(lp, 2, g.FLOAT, false, 0, 0);
  
  g.uniform2f(g.getUniformLocation(prog, "iResolution"), cv.width, cv.height);
  g.uniform1f(g.getUniformLocation(prog, "iTime"), now);
  ["iBass", "iMid", "iTreble", "iLevel", "iBeat"].forEach(u => {
    const l = g.getUniformLocation(prog, u);
    if (l) g.uniform1f(l, 0.0);
  });
  g.drawArrays(g.TRIANGLES, 0, 3);
}

function buildScrollSelectionList() {

  if (!list) return;
  list.innerHTML = "";
  const photosTab = $("tabPhotos");
  const shadersTab = $("tabShaders");
  if (photosTab) photosTab.classList.toggle("on", activeLayerTab === "photos");
  if (shadersTab) shadersTab.classList.toggle("on", activeLayerTab === "shaders");

  const appendGroup = (title, ids, itemLabel, itemTitle) => {
    if (!ids.length) return;
    const group = document.createElement("div"); group.className = "scroll-photo-group";
    const header = document.createElement("div"); header.className = "scroll-photo-header";
    header.textContent = title;
    group.appendChild(header);
    ids.forEach(id => {
      if (!LAYERS[id]) return;
      const item = document.createElement("div"); item.className = "scroll-layer-item";
      item.textContent = itemLabel ? itemLabel(id) : LAYERS[id].label;
      item.dataset.layerId = id;
      item.title = itemTitle || "Click to preview layer";
      wireLayerListItem(item, id);
      group.appendChild(item);
    });
    list.appendChild(group);
  };

  if (activeLayerTab === "photos") {
    CUTOUT_PHOTOS.forEach(photo => {
      const ids = photo.layers
        .map(layerName => `${photo.id}#${layerName.replace(/\s+/g, "")}`)
        .filter(id => !!LAYERS[id]);
      appendGroup(`${photo.id} (${ids.length})`, ids, (id) => {
        const clean = id.split("#")[1] || id;
        const layer = photo.layers.find(name => name.replace(/\s+/g, "") === clean);
        return layer || clean;
      }, "Click to preview cutout; drag to a track layer");
    });
    if (!list.children.length) {
      const empty = document.createElement("div"); empty.className = "scroll-layer-item"; empty.textContent = "No photo cutouts loaded"; list.appendChild(empty);
    }
    return;
  }

  const patIds = Object.keys(LAYERS).filter(id => id.startsWith("pat:")).sort();
  appendGroup(`BUILT-IN PATTERNS (${patIds.length})`, patIds, id => LAYERS[id].label, "Click to preview pattern; drag to a track layer");

  const glslIds = Object.keys(LAYERS).filter(id => id.startsWith("glsl:")).sort();
  appendGroup(`EXTERNAL SHADERS (${glslIds.length})`, glslIds, id => LAYERS[id].label, "Click to preview shader; drag to a track layer");

  const CAT = window.LAYER_CATEGORY || {};
  const groups = { background: [], patterns: [], objects: [], misc: [] };
  Object.keys(LAYERS).forEach(id => {
    if (id.includes("#") && !isCutout(id)) {
      const cleanId = id.startsWith("glsl_obj:") ? id.substring(9) : id;
      const cat = CAT[cleanId] || "misc";
      (groups[cat] || groups.misc).push(id);
    }
  });

  [["background","BACKGROUND"],["patterns","PATTERNS"],["objects","OBJECTS"],["misc","MISC"]].forEach(([k, lab]) => {
    const ids = groups[k].sort();
    appendGroup(`${lab} (${ids.length})`, ids, id => LAYERS[id].label, "Click to preview shader layer; drag to a track layer");
  });
}
function updateBpmFaderUI(val) {
  const min = 60, max = 200;
  const pct = (val - min) / (max - min);
  const bar = document.getElementById("bpm-fader-bar");
  const thumb = document.getElementById("bpm-fader-thumb");
  const n = document.getElementById("bpmNum");
  if (bar) bar.style.height = (pct * 100) + "%";
  if (thumb) thumb.style.bottom = `calc(${pct * 100}% - 3px)`;
  if (n && document.activeElement !== n) n.value = val;
}

load();
$("steps").value = String(state.steps);

initTextureProgram();

loadLayersManifest().then(() => {
  state.layer.forEach((id) => compileLayer(id));
  const tabPhotos = $("tabPhotos"), tabShaders = $("tabShaders");
  if (tabPhotos) tabPhotos.onclick = () => { activeLayerTab = "photos"; buildScrollSelectionList(); };
  if (tabShaders) tabShaders.onclick = () => { activeLayerTab = "shaders"; buildScrollSelectionList(); };
  buildScrollSelectionList();
  buildGrid();
  
  // Setup vertical fader listeners
  const track = $("bpm-fader-track");
  if (track) {
    let draggingFader = false;
    const setBpmFromY = (y) => {
      const rect = track.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, 1 - (y - rect.top) / rect.height));
      const min = 60, max = 200;
      const bpm = Math.round(min + pct * (max - min));
      state.bpm = bpm;
      if (fxKnobs["bpm"]) fxKnobs["bpm"].set(bpm);
      if (state.playing) {
        state.startTime = performance.now()/1000 - state.playhead * stepDur();
      }
      updateBpmFaderUI(bpm);
      save();
    };
    track.addEventListener("pointerdown", (e) => {
      draggingFader = true;
      track.setPointerCapture(e.pointerId);
      setBpmFromY(e.clientY);
      e.preventDefault();
    });
    track.addEventListener("pointermove", (e) => {
      if (draggingFader) setBpmFromY(e.clientY);
    });
    track.addEventListener("pointerup", () => {
      draggingFader = false;
    });
    track.addEventListener("pointercancel", () => {
      draggingFader = false;
    });
    updateBpmFaderUI(state.bpm);
  }
  
  const bpmInput = $("bpmNum");
  if (bpmInput) {
    const applyBpm = () => {
      if (bpmInput.value !== "") {
        const bpm = Math.max(60, Math.min(200, Math.round(+bpmInput.value)));
        state.bpm = bpm;
        if (fxKnobs["bpm"]) fxKnobs["bpm"].set(bpm);
        if (state.playing) {
          state.startTime = performance.now()/1000 - state.playhead * stepDur();
        }
        updateBpmFaderUI(bpm);
        save();
      }
    };
    bpmInput.addEventListener("change", applyBpm);
    bpmInput.addEventListener("keydown", e => { if (e.key === "Enter") { applyBpm(); bpmInput.blur(); } });
  }

  // Setup Strobe/Tape Stop buttons
  const strobeBtn = $("strobe-btn");
  if (strobeBtn) {
    strobeBtn.onclick = () => {
      strobeOn = !strobeOn;
      strobeBtn.classList.toggle("on", strobeOn);
    };
  }
  const tapestopBtn = $("tapestop-btn");
  if (tapestopBtn) {
    const dn = (e) => {
      e.preventDefault();
      tapeStop = true;
      tapestopBtn.classList.add("on");
    };
    const up = () => {
      tapeStop = false;
      tapestopBtn.classList.remove("on");
    };
    tapestopBtn.addEventListener("pointerdown", dn);
    tapestopBtn.addEventListener("pointerup", up);
    tapestopBtn.addEventListener("pointerleave", up);
    tapestopBtn.addEventListener("pointercancel", up);
  }
  
  setActiveChannel(0); // Set default focused track
});

let lastT = performance.now()/1000;

// ---------- Lookahead Scheduler ----------
let lastTickTimePerf = performance.now();
let lastTickTimeAudio = 0;
let visualQueue = [];

const workerBlob = new Blob([`
  let interval;
  self.onmessage = function(e) {
    if (e.data === 'start') {
      interval = setInterval(() => self.postMessage('tick'), 25);
    } else if (e.data === 'stop') {
      clearInterval(interval);
    }
  };
`], {type: 'application/javascript'});
const timerWorker = new Worker(URL.createObjectURL(workerBlob));

function startScheduler() {
    lastTickTimePerf = performance.now();
    lastTickTimeAudio = actx ? actx.currentTime : 0;
    timerWorker.onmessage = () => {
        schedulerTick();
        if (document.hidden || (performance.now() - lastT*1000) > 100) {
            if (typeof rafId !== 'undefined') cancelAnimationFrame(rafId);
            loop();
        }
    };
    timerWorker.postMessage('start');
}

function stopScheduler() {
    timerWorker.postMessage('stop');
    visualQueue = [];
}

function schedulerTick() {
    if (!state.playing) return;
    
    const nowPerf = performance.now();
    const nowAudio = actx ? actx.currentTime : 0;
    const realDt = (nowPerf - lastTickTimePerf) / 1000;
    const dt = Math.min(0.25, realDt); 
    lastTickTimePerf = nowPerf;
    lastTickTimeAudio = nowAudio;

    // TAPE STOP physics
    tapeFactor += ((tapeStop ? 0.0 : 1.0) - tapeFactor) * Math.min(1, dt * (tapeStop ? 3.5 : 6.0));
    if (tapeFactor < 0.002) tapeFactor = 0;

    const prevAccum = playAccum;
    if (fileLoaded && audioEl && !audioEl.paused) {
        audioEl.playbackRate = Math.max(0.02, tapeFactor);
        const currAudioAccum = audioEl.currentTime / stepDur();
        if (currAudioAccum < playAccum - 1) { 
             playAccum = currAudioAccum;
        } else {
             playAccum = currAudioAccum;
        }
    } else {
        playAccum += dt * tapeFactor / stepDur();
    }
    
    state.playhead = (playAccum % state.steps + state.steps) % state.steps;

    const stepBoundary = (n) => {
        const base = Math.floor(n);
        const frac = n - base;
        const off = (base % 2 === 1) ? state.swing * 0.75 : 0.0;
        return base + off;
    };

    const startIdx = Math.floor(prevAccum);
    const endIdx = Math.floor(playAccum) + 2; // +2 to never miss boundary at wrap

    for (let i = startIdx; i <= endIdx; i++) {
        const b = stepBoundary(i);
        if (b > prevAccum && b <= playAccum) {
            let fraction = (playAccum - prevAccum) > 0 ? (b - prevAccum) / (playAccum - prevAccum) : 1.0;
            fraction = Math.max(0, Math.min(1, fraction));
            
            const schedPerf = nowPerf - (dt * 1000) + (fraction * dt * 1000);
            const schedMidi = schedPerf + 5;   // tiny 5ms lookahead for MIDI (tight)
            const schedAudio = nowAudio - dt + (fraction * dt) + 0.050; // 50ms lookahead for Web Audio

            const stepIndex = ((i % state.steps) + state.steps) % state.steps;
            let stepToPlay = stepIndex;
            const sliceValue = state.fx.stutter || 0;
            if (sliceValue > 0.02) {
                const sz = gateSteps(sliceValue);
                stepToPlay = stutterAnchor + (((stepIndex - stutterAnchor) % sz) + sz) % sz;
            }

            let activeChannels = [];
            if (fileLoaded) {
                const onset = (bd, e, floor) => (bd > e * 1.4 + 0.02 && bd > floor) ? 1 : 0;
                const voice = onset(bands.mid,    env.mid,    0.08);
                const drums = onset(bands.treble, env.treble, 0.06);
                const bass  = onset(bands.bass,   env.bass,   0.10);
                const seams = (bass && drums) ? 1 : 0;
                const fills = [voice, drums, bass, seams];
                for (let c=0;c<state.channels;c++) {
                    const on = fills[c % 4];
                    if (on) {
                        activeChannels.push(c);
                        midiNote(c, schedMidi);
                    }
                }
            } else {
                for (let c = 0; c < state.channels; c++) {
                    if (state.grid[c * state.steps + stepToPlay]) {
                        activeChannels.push(c);
                        blip(c, schedAudio);
                        const sliceAmt = state.fx.stutter || 0;
                        if (sliceAmt > 0.02) {
                          const repeats = Math.min(8, 2 + Math.round(sliceAmt * 8));
                          const gap = Math.max(0.018, stepDur() / repeats);
                          for (let r=1; r<repeats; r++) blip(c, schedAudio + gap * r, true);
                        }
                        midiNote(c, schedMidi);
                    }
                }
            }
            visualQueue.push({ step: stepToPlay, time: schedPerf + 50, channels: activeChannels, isFile: fileLoaded });
        }
    }

    // MIDI Clock scheduling is now handled by setInterval in startMidiClock
}

let rafId;
function loop(){
  const now = performance.now();
  const dt = Math.min(0.25, (now/1000) - lastT); lastT = now/1000;
  processLayerUploads();   // upload at most one freshly-decoded layer texture this frame

  while (visualQueue.length > 0 && visualQueue[0].time <= now) {
      const q = visualQueue.shift();
      if (q.isFile) {
          for (let c=0;c<state.channels;c++) {
              const on = q.channels.includes(c) ? 1 : 0;
              state.grid[c*state.steps + q.step] = on;
              const cell = document.querySelector(`.cell[data-c="${c}"][data-s="${q.step}"]`);
              if (cell) cell.classList.toggle("on", !!on);
          }
      }
      for (let c of q.channels) {
          hitPulse(c, q.step);
      }
      if (q.step !== state.lastStep) {
          markPlayhead(q.step);
          state.lastStep = q.step;
      }
  }
  for (let c=0;c<state.channels;c++){
    const e = state.adsr[c] || ADSR_DEF;
    const atk = Math.max(0.01, e.a), rel = e.r;
    const ds = Math.max(0.05, (state.noteLen[c]||0.25) * 4 * 60 / state.bpm + rel * 2.0);
    const decay = Math.pow(0.03, dt / ds);
    for (let s=0;s<state.steps;s++){ const i=c*state.steps+s;
      if (rise2d[i] > 0.5){ pulses2d[i] += dt/atk; if (pulses2d[i] >= 1.0){ pulses2d[i]=1.0; rise2d[i]=0; } }
      else pulses2d[i] *= decay;
    }
  }
  updateBands();
  uploadPulse();
  if (gateGain){
    const gv = state.fx.gate || 0;
    if (gv < 0.02) gateGain.gain.value = 1.0;
    else { const per = gateSteps(gv); const ph = (state.playhead % per) / per; gateGain.gain.value = (ph < 0.5) ? 1.0 : 0.06; }
  }
  const energy = (row) => { if (row >= state.channels) return 0; let m=0; for (let s=0;s<state.steps;s++) m=Math.max(m, pulses2d[row*state.steps+s]); return m; };

  // render at full HD (CSS scales it into the panel; 2nd-screen output stays sharp)
  if (canvas.width !== 1920 || canvas.height !== 1080){ canvas.width = 1920; canvas.height = 1080; }
  ensureFeedbackTexture();
  const nowSec = now / 1000;
  renderLayers(nowSec);
  renderPreview(nowSec);

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.useProgram(prog);
  const pos = gl.getAttribLocation(prog, "position");
  gl.bindBuffer(gl.ARRAY_BUFFER, quad); gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
  gl.uniform2f(U("iResolution"), canvas.width, canvas.height);
  gl.uniform1f(U("iTime"), nowSec);
  gl.uniform1f(U("uBass"), bands.bass);
  gl.uniform1f(U("uMid"), bands.mid);
  gl.uniform1f(U("uTreble"), bands.treble);
  gl.uniform1f(U("uSteps"), state.steps);
  gl.uniform1f(U("uChannels"), state.channels);
  gl.uniform1f(U("uEnOpen"), energy(5));
  gl.uniform1f(U("uStrobe"), strobeOn ? 1.0 : 0.0);
  gl.uniform1f(U("uSpiral"), state.fx.spiral || 0.0);
  // Visual FX uniforms
  const trackFxPulse = (key) => { let m = 0; for (let c=0; c<state.channels; c++) if (state.trackFx[c] === key) m = Math.max(m, energy(c)); return m; };
  const fxVis = (key, base) => Math.min(1.0, Math.max(0.0, (base || 0) + trackFxPulse(key) * Math.max(0.35, base || 0)));
  const trackLayerFx = (c, key, base) => {
    const pulse = state.trackFx[c] === key ? energy(c) : 0;
    return Math.min(1.0, Math.max(0.0, (base || 0) + pulse * Math.max(0.35, Math.abs(base || 0))));
  };
  for (let c=0; c<8; c++) {
    const pitchTotalLayer = (state.fx.pitch || 0) + (state.fx.trans || 0) + (state.pitch[c] || 0) + ((state.trackFx[c] === "pitch" || state.trackFx[c] === "trans") ? (energy(c) * 12) : 0);
    gl.uniform1f(U(`uLayerOffset[${c}].x`), layerOffsetX[c]);
    gl.uniform1f(U(`uLayerOffset[${c}].y`), layerOffsetY[c]);
    gl.uniform1f(U(`uLayerScale[${c}]`), layerScale[c]);
    gl.uniform1f(U(`uLayerRot[${c}]`), layerRotation[c]);
    gl.uniform1f(U(`uLayerPitchVis[${c}]`), Math.min(1.0, Math.abs(pitchTotalLayer) / 12.0));
    gl.uniform1f(U(`uLayerPitchWarp[${c}]`), Math.max(-1.0, Math.min(1.0, pitchTotalLayer / 12.0)));
    gl.uniform1f(U(`uLayerFlangerVis[${c}]`), trackLayerFx(c, "flanger", state.fx.flanger || 0.0));
    gl.uniform1f(U(`uLayerPhaserVis[${c}]`), trackLayerFx(c, "phaser", state.fx.phaser || 0.0));
  }
  gl.uniform1f(U("uSpiral"), state.fx.spiral || 0.0);
  gl.uniform1f(U("uDistortVis"), fxVis("distort", state.fx.distort || 0.0));
  gl.uniform1f(U("uFilterVis"), Math.max(-1.0, Math.min(1.0, (fxFilter || 0.0) + trackFxPulse("filter") * (fxFilter || 0.5))));
  gl.uniform1f(U("uTremoloVis"), fxVis("tremolo", state.fx.tremolo || 0.0));
  gl.uniform1f(U("uDelayVis"), fxVis("delay", echoLevel || 0.0));
  gl.uniform1f(U("uRollVis"), fxVis("roll", state.fx.roll || 0.0));
  gl.uniform1f(U("uReverbVis"), fxVis("reverb", state.reverb || 0.0));
  gl.uniform3f(U("uEqVis"), state.fx.lo || 0.0, state.fx.mid || 0.0, state.fx.hi || 0.0);
  // Gate visual: compute whether current beat is gated off
  const gateVal = state.fx.gate || 0;
  let gateVisVal = 0.0;
  if (gateVal > 0.02 && state.playing) {
    const per = gateSteps(gateVal);
    const ph = (state.playhead % per) / per;
    gateVisVal = (ph < 0.5) ? 0.0 : 1.0;
  }
  gl.uniform1f(U("uGateVis"), gateVisVal);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, pulseTex); gl.uniform1i(U("uPulseTex"), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, atlasTex); gl.uniform1i(U("uAtlas"), 1);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, feedbackTex); gl.uniform1i(U("uFeedback"), 2);
  for (let c=0;c<8;c++){
    gl.uniform1f(U("uHasLayer[" + c + "]"), (c < state.channels && layerReady(c)) ? 1.0 : 0.0);
    gl.uniform1f(U("uVis[" + c + "]"), (c < state.channels && visible(c) && layerReady(c)) ? 1.0 : 0.0);
    gl.uniform1f(U("uOpacity[" + c + "]"), (c < state.channels) ? (state.opacity[c] !== undefined ? state.opacity[c] : 1.0) : 1.0);
    gl.uniform1f(U("uPulse[" + c + "]"), (c < state.channels) ? energy(c) : 0.0);
  }
  gl.drawArrays(gl.TRIANGLES, 0, 6);
  gl.bindTexture(gl.TEXTURE_2D, feedbackTex);
  gl.copyTexSubImage2D(gl.TEXTURE_2D, 0, 0, 0, 0, 0, feedbackW, feedbackH);
  rafId = requestAnimationFrame(loop);
}
loop();
</script>
</body>
